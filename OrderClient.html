  async function getAISuggestion() {
    const custom = document.getElementById('ai-custom').value.trim();
    const goal = custom || selectedGoal;
    if (!goal) { showToast('⚠️ Chọn mục tiêu!'); return; }
    const nuts = inventoryData.filter(i => i.type === 'Hạt' || i.name.toLowerCase().includes('hạt')).map(i => i.name);
    const btn = document.querySelector('.ai-btn');
    const errEl = document.getElementById('ai-result-error');
    const box = document.getElementById('ai-result-box');
    const txt = document.getElementById('ai-result-text');
    if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang phân tích...';
    btn.disabled = true;
    try {
      const r = await api.callLong('getAISuggestion', 90000, goal, nuts);
      btn.innerHTML = '<i class="fa-solid fa-seedling"></i> Nhận tư vấn từ AI';
      btn.disabled = false;
      if (r && r.suggestion) {
        box.classList.add('show');
        txt.textContent = r.suggestion;
      } else if (r && r.error) {
        box.classList.add('show');
        txt.textContent = '';
        if (errEl) {
          errEl.style.display = 'block';
          errEl.textContent = 'Lỗi: ' + r.error;
        }
        showToast('⚠️ Xem chi tiết lỗi trong khung AI');
      } else {
        box.classList.add('show');
        txt.textContent = 'Không có phản hồi từ AI.';
      }
    } catch (e) {
      btn.innerHTML = '<i class="fa-solid fa-seedling"></i> Nhận tư vấn từ AI';
      btn.disabled = false;
      box.classList.add('show');
      if (errEl) {
        errEl.style.display = 'block';
        errEl.textContent = 'Lỗi kết nối: ' + (e.message || e);
      }
      showToast('❌ Không kết nối AI!');
    }
  }

  var __knownOnlineIds = {};

  function escHtml(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function parseOrderItemsJson(raw) {
    try {
      var a = typeof raw === 'string' ? JSON.parse(raw) : raw;
      return Array.isArray(a) ? a : [];
    } catch (e) { return []; }
  }

  /** Đơn nhóm: đọc mã + tên nhóm từ ghi chú đơn ([GROUP:CODE] «Tên nhóm» — ...). */
  function parseGroupInfoFromNote(note) {
    var m = String(note || '').match(/\[GROUP:([A-Z0-9]+)\]\s*(?:«([^»]*)»)?/);
    if (!m) return null;
    return { code: m[1], name: m[2] || '' };
  }
  function onlineOrderStatusChip(st) {
    var s = String(st || '');
    var bg = '#f5f5f4', fg = '#57534e';
    if (s.indexOf('Hoàn') >= 0) { bg = '#dcfce7'; fg = '#15803d'; }
    else if (s.indexOf('Hủy') >= 0) { bg = '#fee2e2'; fg = '#b91c1c'; }
    else if (s.indexOf('giao') >= 0 || s.indexOf('nhận') >= 0) { bg = '#e0e7ff'; fg = '#4338ca'; }
    else if (s.indexOf('chế biến') >= 0) { bg = '#dbeafe'; fg = '#1d4ed8'; }
    else if (s.indexOf('Chờ') >= 0 || s.indexOf('chờ') >= 0) { bg = '#fef3c7'; fg = '#92400e'; }
    return '<span style="font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;background:' + bg + ';color:' + fg + ';white-space:nowrap;">' + escHtml(s) + '</span>';
  }
  function onlineOrderItemOptsText(it) {
    var o = (it && it.options) || {};
    var parts = [];
    if (o.size && o.size !== 'Tiêu chuẩn') parts.push(o.size);
    if (o.serveTemp === 'hot') parts.push('Nóng');
    else if (o.serveTemp === 'iced') parts.push('Đá' + (o.ice ? ': ' + o.ice : ''));
    if (o.sweetness) parts.push(o.sweetness);
    if (o.packaging === 'plastic') parts.push('Chai nhựa');
    (o.addons || []).forEach(function (a) { parts.push(a); });
    return parts.join(' · ');
  }
  function getItemMemberName(it) {
    var who = String((it && it.groupMember) || '').trim();
    if (!who) {
      var mN = String((it && it.note) || '').match(/^\[([^\]]{1,40})\]/);
      who = mN ? mN[1] : '';
    }
    return who || 'Khách';
  }
  function getItemNoteClean(it) {
    return String((it && it.note) || '').replace(/^\[[^\]]{1,40}\]\s*/, '').trim();
  }

  var __labelBtConnecting = null;
  var LABEL_BLE_SERVICES = [

    '49535343-fe7d-4ae5-8fa9-9fafcf205e55',
    '6e400001-b5a3-f393-e0a9-e50e24dcca9e',

  function isAndroidDevice() { return /Android/i.test(navigator.userAgent || ''); }

  function bleChunkSize() { return isMobileDevice() ? 20 : 180; }

  function labelDots(mm) { return Math.round(mm / 25.4 * LABEL_DPI); }

  async function findBleWriteChar(server) {
    var ci, si, c, chars, services;
    for (ci = 0; ci < LABEL_WRITE_CHARS.length; ci++) {
      try {
        c = await server.getCharacteristic(LABEL_WRITE_CHARS[ci]);
        if (c && (c.properties.writeWithoutResponse || c.properties.write)) return c;
      } catch (eC) { }
    }
    services = await server.getPrimaryServices();
    for (si = 0; si < services.length; si++) {
      chars = await services[si].getCharacteristics();
      for (ci = 0; ci < chars.length; ci++) {
        c = chars[ci];
        if (c.properties.writeWithoutResponse) return c;
      }
    }
    for (si = 0; si < services.length; si++) {
      chars = await services[si].getCharacteristics();
      for (ci = 0; ci < chars.length; ci++) {
        c = chars[ci];
        if (c.properties.write) return c;
      }
    }
    return null;
  }

  async function attachLabelDevice(device) {
    if (!device || !device.gatt) throw new Error('Thiết bị không hỗ trợ BLE GATT');
    if (device.gatt.connected) {
      try { device.gatt.disconnect(); await new Promise(function (r) { setTimeout(r, 300); }); } catch (eD) { }
    }
    var server = await device.gatt.connect();
    var ch = await findBleWriteChar(server);
    if (!ch) {
      try { server.disconnect(); } catch (eX) { }
      throw new Error('Không tìm thấy kênh in trên máy - thử bấm Quét BT và chọn đúng CLABEL 221B');
    }
    __labelBt = {
      device: device, server: server, char: ch,
      connected: true, name: device.name || 'Máy in tem', protocol: 'escpos'
    };
    device.addEventListener('gattserverdisconnected', function () {
      __labelBt.connected = false;
      __labelBt.char = null;
      updateLabelPrinterUi();
      showToast('Máy in ngắt kết nối - bấm In tem sẽ tự kết nối lại');
    });
    try {
      localStorage.setItem('sun_label_bt_id', device.id || '');
      localStorage.setItem('sun_label_bt_name', device.name || '');
    } catch (eLs) { }
    updateLabelPrinterUi();
    return device;
  }

  /** Tự kết nối lại máy in đã cấp quyền trước đó (Chrome hỗ trợ getDevices). */
  async function tryReconnectLabelPrinter(silent) {
    if (labelPrinterIsReady()) return true;
    if (!navigator.bluetooth || !navigator.bluetooth.getDevices) return false;
    var savedId = '';
    try { savedId = localStorage.getItem('sun_label_bt_id') || ''; } catch (eId) { }
    try {
      var devices = await navigator.bluetooth.getDevices();
      if (!devices || !devices.length) return false;
      var pick = null;
      devices.forEach(function (d) {
        if (savedId && d.id === savedId) pick = d;
      });
      if (!pick) {
        devices.forEach(function (d) {
          var n = String(d.name || '').toUpperCase();
          if (!pick && (/CLABEL|221B|CT221|LABEL|PRINTER/.test(n))) pick = d;
        });
      }
      if (!pick) pick = devices[0];
      await attachLabelDevice(pick);
      if (!silent) showToast('✅ Đã kết nối lại ' + (__labelBt.name || 'máy in tem'));
      return true;
    } catch (e) {
      if (!silent) showToast('Không kết nối lại được - bấm Kết nối CLABEL hoặc Quét BT');
      return false;
    }
  }

  async function requestLabelBleDevice(scanAll) {
    var req = { optionalServices: LABEL_BLE_SERVICES };
    if (scanAll) req.acceptAllDevices = true;
    else {
      req.filters = [
        { namePrefix: 'CLABEL' }, { namePrefix: '221B' }, { namePrefix: 'CT221' },
        { namePrefix: 'Label' }, { namePrefix: 'Printer' }, { namePrefix: 'BT' }
      ];
    }
    var device = await navigator.bluetooth.requestDevice(req);
    await attachLabelDevice(device);
    return true;
  }
  async function ensureLabelPrinterConnectedInner(opts) {
    opts = opts || {};
    if (!navigator.bluetooth) {
      if (!opts.silent) {
        showToast(isAndroidDevice()
          ? '⚠️ Dùng Chrome Android + bật Bluetooth + Vị trí để in tem'
          : '⚠️ Trình duyệt không hỗ trợ Bluetooth - dùng Chrome/Edge');
      }
      return false;
    }
    if (labelPrinterIsReady()) return true;
    if (await tryReconnectLabelPrinter(true)) return true;
    if (!opts.prompt) return false;
    if (!opts.silent) showToast('🔵 Đang kết nối máy in Bluetooth…');
    try {
      await requestLabelBleDevice(false);
      return true;
    } catch (e1) {
      if (opts.allowScan && e1 && (e1.name === 'NotFoundError' || String(e1.message || '').indexOf('cancel') >= 0)) {
        try {
          if (!opts.silent) showToast('Quét tất cả thiết bị BT - chọn CLABEL 221B…');
          await requestLabelBleDevice(true);
          return true;
        } catch (e2) {
          if (!opts.silent) showToast('Chưa chọn máy in - bật Bluetooth và chọn CLABEL 221B');
          return false;
        }
      }
      if (e1 && e1.name === 'SecurityError') {
        if (!opts.silent) showToast('⚠️ Bật Quyền Bluetooth + Vị trí cho Chrome rồi thử lại');
        return false;
      }
      if (!opts.silent && !(e1 && (e1.name === 'NotFoundError' || String(e1.message || '').indexOf('cancel') >= 0))) {
        showToast('⚠️ ' + ((e1 && e1.message) || e1 || 'Không kết nối được máy in'));
      }
      return false;
    }
  }
  /** Tự kết nối BT trước khi in — lần đầu hỏi chọn máy, sau đó tự nối lại. */
  async function ensureLabelPrinterConnected(opts) {
    opts = opts || {};
    if (labelPrinterIsReady()) return true;
    if (__labelBtConnecting) {
      try { await __labelBtConnecting; } catch (eW) { }
      return labelPrinterIsReady();
    }
    __labelBtConnecting = ensureLabelPrinterConnectedInner(opts);
    try { return await __labelBtConnecting; }
    finally { __labelBtConnecting = null; }
  }
  /**
   * Kết nối máy in tem Bluetooth (dùng khi muốn đổi máy / thiết lập lần đầu).
   * mode: 'clabel' | 'scan' | 'reconnect'
   */
  window.connectLabelPrinter = async function (mode) {
    mode = mode || 'clabel';
    if (!navigator.bluetooth) {
      showToast(isAndroidDevice()
        ? '⚠️ Dùng Chrome trên Android và bật Bluetooth + Vị trí để in tem'
        : '⚠️ Trình duyệt không hỗ trợ Bluetooth - dùng Chrome/Edge');
      return;
    }
    if (mode === 'reconnect') {
      await tryReconnectLabelPrinter(false);
      return;
    }
    showLoading(true);
    try {
      if (__labelBt.device && __labelBt.device.gatt && __labelBt.device.gatt.connected) {
        try { __labelBt.device.gatt.disconnect(); } catch (eD) { }
      }
      await requestLabelBleDevice(mode === 'scan');
      showToast('✅ Đã kết nối ' + (__labelBt.name || 'máy in tem'));
    } catch (e) {
      if (e && (e.name === 'NotFoundError' || String(e.message || '').indexOf('cancel') >= 0)) {
        showToast(mode === 'scan'
          ? 'Chưa chọn máy in - bật Bluetooth, chọn CLABEL 221B trong danh sách'
          : 'Không thấy CLABEL - thử bấm Quét BT để tìm tất cả thiết bị');
      } else if (e && e.name === 'SecurityError') {
        showToast('⚠️ Android: bật Quyền Vị trí + Bluetooth cho Chrome rồi thử lại');
      } else {
        showToast('⚠️ ' + ((e && e.message) || e || 'Không kết nối được máy in'));
      }
    }
    showLoading(false);
  };

  async function bleWriteLabel(data) {
    if (!__labelBt.char) throw new Error('Chưa kết nối máy in tem');
    var chunk = bleChunkSize();
    var delay = bleChunkDelay();
    var useResp = !__labelBt.char.properties.writeWithoutResponse && __labelBt.char.properties.write;
    for (var i = 0; i < data.length; i += chunk) {
      var slice = data.subarray(i, Math.min(i + chunk, data.length));
      if (useResp) {
        await __labelBt.char.writeValue(slice);
      } else {
        await __labelBt.char.writeValueWithoutResponse(slice);
      }
      if (i + chunk < data.length) await new Promise(function (r) { setTimeout(r, delay); });
    }
    await new Promise(function (r) { setTimeout(r, delay * 2); });
  }
  /** Vẽ tem 30×40mm lên canvas (Arial, tiếng Việt) → ESC/POS raster. */
  function buildLabelEscPos(payload) {
    var w = labelDots(LABEL_W_MM);
    var h = labelDots(LABEL_H_MM);
    w = Math.ceil(w / 8) * 8;
    var canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    var ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#000';
    ctx.textBaseline = 'top';
    var y = 6;
    var pad = 8;
    var maxW = w - pad * 2;
    function drawLines(text, size, weight, maxLines) {
      if (!text) return;
      ctx.font = (weight || 'bold') + ' ' + size + 'px Arial, Helvetica, sans-serif';
      var words = String(text).split(/\s+/);
      var line = '';
      var lines = 0;
      for (var wi = 0; wi < words.length; wi++) {
        var test = line ? line + ' ' + words[wi] : words[wi];
        if (ctx.measureText(test).width > maxW && line) {
          ctx.fillText(line, pad, y);
          y += size + 3;
          lines++;
          if (maxLines && lines >= maxLines) return;
          line = words[wi];
        } else {
          line = test;
        }
      }
      if (line && (!maxLines || lines < maxLines)) {
        ctx.fillText(line, pad, y);
        y += size + 4;
      }
    }
    drawLines(payload.drink || 'Món', 15, 'bold', 2);
    ctx.font = 'bold 13px Arial, Helvetica, sans-serif';
    ctx.fillText('KH: ' + (payload.member || 'Khách'), pad, y);
    y += 17;
    drawLines(payload.opts || '', 10, 'normal', 2);
    if (payload.note) {
      ctx.font = '600 10px Arial, Helvetica, sans-serif';
      drawLines('GC: ' + payload.note, 10, '600', 2);
    }
    var img = ctx.getImageData(0, 0, w, h);
    var bytesPerRow = w / 8;
    var raster = new Uint8Array(bytesPerRow * h);
    for (var row = 0; row < h; row++) {
      for (var bx = 0; bx < bytesPerRow; bx++) {
        var b = 0;
        for (var bit = 0; bit < 8; bit++) {
          var x = bx * 8 + bit;
          var idx = (row * w + x) * 4;
          var gray = (img.data[idx] + img.data[idx + 1] + img.data[idx + 2]) / 3;
          if (gray < 168) b |= (0x80 >> bit);
        }
        raster[row * bytesPerRow + bx] = b;
      }
    }
    var xL = bytesPerRow & 0xff;
    var xH = (bytesPerRow >> 8) & 0xff;
    var yL = h & 0xff;
    var yH = (h >> 8) & 0xff;
    var out = new Uint8Array(10 + raster.length + 6);
    var p = 0;
    out[p++] = 0x1B; out[p++] = 0x40; // init
    out[p++] = 0x1D; out[p++] = 0x76; out[p++] = 0x30; out[p++] = 0x00; // GS v 0 raster
    out[p++] = xL; out[p++] = xH; out[p++] = yL; out[p++] = yH;
    out.set(raster, p); p += raster.length;
    out[p++] = 0x1B; out[p++] = 0x64; out[p++] = 0x04; // feed
    out[p++] = 0x1D; out[p++] = 0x56; out[p++] = 0x00; // partial cut (nếu máy hỗ trợ)
    return out.subarray(0, p);
  }
  /** Fallback: in tem qua hộp thoại trình duyệt (30×40mm). */

    var w = document.open('', '_blank', 'width=320,height=420');

      '.o{font-size:7pt;line-height:1.25;color:#222;margin-bottom:.5mm}' +
      '.t{font-size:7pt;font-weight:600;color:#7c2d12}' +
      '</style></head><body>' +
      '<div class="n">' + esc(payload.drink) + '</div>' +

      (payload.note ? '<div class="t">📝 ' + esc(payload.note) + '</div>' : '') +
      '</body></html>');
    w.document.close();
    w.focus();
    setTimeout(function () { try { w.print(); } catch (eP) { } }, 350);

  async function printCupLabel(payload, opts) {
    opts = opts || {};
    var connected = await ensureLabelPrinterConnected({ prompt: true, allowScan: true, silent: !!opts.quiet });
    if (!connected) return false;
    try {
      await bleWriteLabel(buildLabelEscPos(payload));
      if (!opts.quiet) showToast('🏷️ Đã in: ' + (payload.drink || 'tem'));
      return true;
    } catch (e) {
      __labelBt.connected = false;
      __labelBt.char = null;
      updateLabelPrinterUi();
      if (await ensureLabelPrinterConnected({ prompt: true, allowScan: true, silent: true })) {
        try {
          await bleWriteLabel(buildLabelEscPos(payload));
          if (!opts.quiet) showToast('🏷️ Đã in: ' + (payload.drink || 'tem'));
          return true;
        } catch (e2) { e = e2; }
      }
      showToast('⚠️ In lỗi: ' + ((e && e.message) || e));
      return false;
    }
  }
  window.printCupLabelClick = async function (oid, idx) {
    var o = (__onlineOrdersCache || []).find(function (x) { return String(x.id) === String(oid); });
    if (!o) return;
    var items = parseOrderItemsJson(o.items);
    var it = items[idx];
    if (!it) return;
    showLoading(true);
    try {
      await printCupLabel({
        drink: it.name || it.productName || 'Món',
        member: getItemMemberName(it),
        opts: onlineOrderItemOptsText(it),
        note: getItemNoteClean(it),
        orderId: oid
      });
    } finally {
      showLoading(false);
    }
  };
  window.printAllCupLabels = async function (oid) {
    var o = (__onlineOrdersCache || []).find(function (x) { return String(x.id) === String(oid); });
    if (!o) return;
    var items = parseOrderItemsJson(o.items);
    if (!items.length) { showToast('Đơn không có món để in tem'); return; }
    showLoading(true);
    try {
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        await printCupLabel({
          drink: it.name || it.productName || 'Món',
          member: getItemMemberName(it),
          opts: onlineOrderItemOptsText(it),
          note: getItemNoteClean(it),
          orderId: oid
        }, { quiet: true });
        await new Promise(function (r) { setTimeout(r, 400); });
      }
      showToast('✅ Đã in ' + items.length + ' tem cho đơn ' + oid);
    } catch (e) {
      showToast('⚠️ ' + ((e && e.message) || e));
    }
    showLoading(false);
  };
  // ---- Checklist bếp: tick từng món đã pha (lưu trên máy POS) ----
  function getOoChecks(oid) {
    try { return JSON.parse(localStorage.getItem('sun_pos_check_' + oid) || '{}'); } catch (e) { return {}; }
  }
  function setOoChecks(oid, c) {
    try { localStorage.setItem('sun_pos_check_' + oid, JSON.stringify(c)); } catch (e) { }
  }
  function ooCheckedCount(o) {
    var items = parseOrderItemsJson(o && o.items);
    var c = getOoChecks(o.id);
    var n = 0;
    items.forEach(function (_, i) { if (c[i]) n++; });
    return { done: n, total: items.length };
  }
  window.toggleOoCheck = function (oid, idx) {
    var c = getOoChecks(oid);
    if (c[idx]) delete c[idx]; else c[idx] = 1;
    setOoChecks(oid, c);
    renderOnlineOrdersList();
  };
  /** Chi tiết món — checklist cho bếp, đơn nhóm gộp theo từng người. */
  function renderOnlineOrderItemsDetail(o) {
    var items = parseOrderItemsJson(o && o.items);
    if (!items.length) return '<p style="color:#a8a29e;padding:8px 0;">Không có món.</p>';
    var gi = parseGroupInfoFromNote(o && o.note);
    var checks = getOoChecks(o.id);
    var oidJs = escHtml(String(o.id)).replace(/'/g, "\\'");
    var lineHtml = function (it, idx) {
      var qty = it.qty || it.quantity || 1;
      var unit = parseFloat(it.price || it.unitPrice) || (qty ? (parseFloat(it.totalPrice) || 0) / qty : 0);
      var opts = onlineOrderItemOptsText(it);
      var itemNote = getItemNoteClean(it);
      var done = !!checks[idx];
      return '<div class="oo-item' + (done ? ' done' : '') + '">' +
        '<span class="oo-check" onclick="toggleOoCheck(\'' + oidJs + '\',' + idx + ')" title="Tick món đã pha"><i class="fa-solid fa-check"></i></span>' +
        '<div class="oo-item-main" onclick="toggleOoCheck(\'' + oidJs + '\',' + idx + ')">' +
        '<div class="oo-item-line"><strong class="oo-item-nm">' + escHtml(it.name || it.productName || '') + ' ×' + qty + '</strong><span>' + fmt(unit * qty) + '</span></div>' +
        (opts ? '<div class="oo-item-opts">' + escHtml(opts) + '</div>' : '') +
        (itemNote ? '<div class="oo-item-note">📝 ' + escHtml(itemNote) + '</div>' : '') +
        '</div>' +
        '<button type="button" class="oo-print-btn" onclick="event.stopPropagation(); printCupLabelClick(\'' + oidJs + '\',' + idx + ')" title="In tem - tự kết nối Bluetooth"><i class="fa-solid fa-tag"></i></button>' +
        '</div>';
    };
    // Đơn thường: 1 khối chung
    if (!gi) {
      return '<div class="oo-member"><div class="oo-member-h"><span><i class="fa-solid fa-mug-hot"></i> Món cần pha</span></div>' +
        items.map(function (it, i) { return lineHtml(it, i); }).join('') + '</div>';
    }
    // Đơn nhóm: gộp theo từng người (giữ nguyên index gốc để checklist đúng món)
    var byMember = {};
    var order = [];
    items.forEach(function (it, i) {
      var who = String(it.groupMember || '').trim();
      if (!who) {
        var mN = String(it.note || '').match(/^\[([^\]]{1,40})\]/);
        who = mN ? mN[1] : 'Khách';
      }
      if (!byMember[who]) { byMember[who] = []; order.push(who); }
      byMember[who].push({ it: it, idx: i });
    });
    return order.map(function (who) {
      var list = byMember[who];
      var qtyTotal = list.reduce(function (s, e) { return s + (e.it.qty || e.it.quantity || 1); }, 0);
      var sub = list.reduce(function (s, e) {
        var q = e.it.qty || e.it.quantity || 1;
        var u = parseFloat(e.it.price || e.it.unitPrice) || (q ? (parseFloat(e.it.totalPrice) || 0) / q : 0);
        return s + u * q;
      }, 0);
      return '<div class="oo-member"><div class="oo-member-h">' +
        '<span><i class="fa-solid fa-circle-user"></i> ' + escHtml(who) + ' <span class="n">(' + qtyTotal + ' món)</span></span><span>' + fmt(sub) + '</span></div>' +
        list.map(function (e) { return lineHtml(e.it, e.idx); }).join('') + '</div>';
    }).join('');
  }

  function ooActBtnClass(status, allDone) {
    var s = String(status || '');
    if (s.indexOf('Hủy') >= 0) return 'oo-btn oo-btn-danger';
    if (s.indexOf('hoàn tất chế biến') >= 0) return 'oo-btn oo-btn-success' + (allDone ? ' ready' : '');
    if (s.indexOf('Hoàn thành') >= 0) return 'oo-btn oo-btn-success';
    if (s.indexOf('giao') >= 0 || s.indexOf('nhận') >= 0) return 'oo-btn oo-btn-info';
    return 'oo-btn oo-btn-secondary';
  }
  function ooActIcon(status) {
    var s = String(status || '');
    if (s.indexOf('Hủy') >= 0) return '<i class="fa-solid fa-ban"></i> ';
    if (s.indexOf('hoàn tất chế biến') >= 0) return '<i class="fa-solid fa-bell-concierge"></i> ';
    if (s.indexOf('Hoàn thành') >= 0) return '<i class="fa-solid fa-circle-check"></i> ';
    if (s.indexOf('giao') >= 0) return '<i class="fa-solid fa-motorcycle"></i> ';
    if (s.indexOf('nhận') >= 0) return '<i class="fa-solid fa-store"></i> ';
    return '';
  }
  function onlineStatusActions(st) {
    var s = String(st || '');
    if (s.indexOf('Chờ') === 0 || s.indexOf('chờ') === 0) {
      return [
        { label: 'Hoàn tất chế biến', status: 'Đơn đã hoàn tất chế biến' },
        { label: 'Hủy', status: 'Hủy' }
      ];
    }
    if (s.indexOf('chế biến') >= 0) {
      return [
        { label: 'Chờ nhận / đang giao', status: 'Đang giao hàng' },
        { label: 'Nhận tại quầy', status: 'Chờ nhận hàng' }
      ];
    }
    if (s.indexOf('giao') >= 0 || s.indexOf('nhận') >= 0) {
      return [{ label: 'Hoàn tất đơn', status: 'Hoàn thành' }];
    }
    return [{ label: 'Hoàn tất đơn', status: 'Hoàn thành' }];
  }

  function normalizeOnlineOrders(list) {
    (list || []).forEach(function (o) { if (o && !o.id) o.id = o.orderId; });
    return list || [];
  }

  async function refreshOnlineOrdersBadge() {
    try {
      var r = await api.call('getOnlineOrdersForAdmin', 30);
      var list = normalizeOnlineOrders((r && r.orders) || []);
      var pending = list.filter(function (o) {
        var st = String(o.status || '');
        return st.indexOf('Hoàn') < 0 && st.indexOf('Hủy') < 0;
      });
      var badge = document.getElementById('online-orders-badge');
      if (badge) {
        if (pending.length) { badge.style.display = 'inline-flex'; badge.textContent = String(pending.length); }
        else badge.style.display = 'none';
      }
      list.forEach(function (o) {
        if (!__knownOnlineIds[o.id] && String(o.status || '').indexOf('Chờ') >= 0) {
          showToast('📱 Đơn online mới: ' + o.id);
        }
        __knownOnlineIds[o.id] = true;
      });
      __onlineOrdersCache = list;
    } catch (e) { /* ignore poll */ }
  }

  // Tab Đang chờ làm / Đã hoàn tất + trạng thái mở/đóng từng đơn
  var __onlineTab = 'active';
  var __ooOpen = {};
  function isOnlineOrderDone(o) {
    var s = String((o && o.status) || '');
    return s.indexOf('Hoàn thành') >= 0 || s.indexOf('Hủy') >= 0;
  }
  window.switchOnlineTab = function (t) {
    __onlineTab = t === 'done' ? 'done' : 'active';
    var ta = document.getElementById('oo-tab-active');
    var td = document.getElementById('oo-tab-done');
    if (ta) ta.classList.toggle('on', __onlineTab === 'active');
    if (td) td.classList.toggle('on', __onlineTab === 'done');
    renderOnlineOrdersList();
  };
  function ooFmtTime(t) {
    var d = typeof t === 'number' ? new Date(t) : new Date(String(t || ''));
    if (isNaN(d.getTime())) return '';
    var p = function (n) { return (n < 10 ? '0' : '') + n; };
    return p(d.getHours()) + ':' + p(d.getMinutes()) + ' ' + p(d.getDate()) + '/' + p(d.getMonth() + 1);
  }
  function renderOnlineOrdersList() {
    var box = document.getElementById('online-orders-list');
    if (!box) return;
    var all = __onlineOrdersCache || [];
    var active = all.filter(function (o) { return !isOnlineOrderDone(o); });
    var done = all.filter(isOnlineOrderDone);
    var ca = document.getElementById('oo-count-active');
    var cd = document.getElementById('oo-count-done');
    if (ca) ca.textContent = String(active.length);
    if (cd) cd.textContent = String(done.length);
    var list = __onlineTab === 'done' ? done : active;
    if (!list.length) {
      box.innerHTML = '<div class="oo-empty">' + (__onlineTab === 'done'
        ? '<i class="fa-solid fa-mug-hot"></i> Chưa có đơn hoàn tất / hủy.'
        : '🎉 Không còn đơn chờ làm — bếp thảnh thơi!') + '</div>';
      return;
    }
    box.innerHTML = list.map(function (o) {
      var oidJs = escHtml(String(o.id)).replace(/'/g, "\\'");
      var isDone = isOnlineOrderDone(o);
      var isOpen = __ooOpen[o.id] != null ? !!__ooOpen[o.id] : !isDone; // đơn đang làm: mở sẵn chi tiết
      var gi = parseGroupInfoFromNote(o.note);
      var prog = ooCheckedCount(o);
      var allDone = prog.total > 0 && prog.done >= prog.total;
      var acts = '<button type="button" class="oo-btn oo-btn-label" onclick="printAllCupLabels(\'' + oidJs + '\')"><i class="fa-solid fa-tags"></i> In tem tất cả</button>' +
        onlineStatusActions(o.status).map(function (a) {
          return '<button type="button" class="' + ooActBtnClass(a.status, allDone) + '" onclick="updateOnlineOrderStatusClick(\'' + oidJs + '\',\'' + escHtml(a.status).replace(/'/g, "\\'") + '\')">' +
            ooActIcon(a.status) + escHtml(a.label) + '</button>';
        }).join('');
      var members = gi ? parseOrderItemsJson(o.items).reduce(function (acc, it) {
        var who = String(it.groupMember || '').trim() || (String(it.note || '').match(/^\[([^\]]{1,40})\]/) || [])[1] || '';
        if (who && acc.indexOf(who) < 0) acc.push(who);
        return acc;
      }, []) : [];
      var groupBanner = gi
        ? ('<div class="oo-group-banner"><i class="fa-solid fa-user-group"></i> ĐƠN NHÓM' + (gi.name ? ' — ' + escHtml(gi.name) : '') + ' (mã ' + escHtml(gi.code) + ')' +
          (members.length ? '<small>' + members.length + ' người: ' + escHtml(members.join(', ')) + '</small>' : '') + '</div>')
        : '';
      var progress = (!isDone && prog.total)
        ? ('<div class="oo-progress' + (allDone ? ' done' : '') + '"><span>' + (allDone ? '✅ Đã pha xong hết' : '☕ Đã pha ' + prog.done + '/' + prog.total + ' món') + '</span>' +
          '<span class="oo-progress-bar"><i style="width:' + Math.round(prog.done / prog.total * 100) + '%;"></i></span></div>')
        : '';
      var tStr = ooFmtTime(o.time);
      var meta = [escHtml(o.customerName || ''), escHtml(o.customerPhone || ''), escHtml(o.paymentMethod || '')]
        .filter(Boolean).join(' · ') + (tStr ? ' · 🕐 ' + tStr : '');
      var disc = parseFloat(o.discount) > 0 ? ' <span style="color:#15803d;font-weight:700;font-size:11px;">(−' + fmt(parseFloat(o.discount)) + ')</span>' : '';
      return '<div class="oo-card' + (isOpen ? ' open' : '') + '">' +
        '<div class="oo-card-h" onclick="toggleOnlineOrderDetail(\'' + oidJs + '\')">' +
        '<div style="min-width:0;"><div class="oo-id">' + (gi ? '<i class="fa-solid fa-user-group" style="color:#ea580c;"></i> ' : '') + escHtml(o.id) + '</div>' +
        '<div class="oo-meta">' + meta + '</div></div>' +
        '<div class="oo-right">' + onlineOrderStatusChip(o.status) +
        '<span class="oo-total">' + fmt(parseFloat(o.finalAmount) || 0) + disc + '</span>' +
        '<i class="fa-solid fa-chevron-down oo-chev"></i></div></div>' +
        groupBanner + progress +
        '<div class="oo-body">' + (isOpen ? renderOnlineOrderItemsDetail(o) : '') + '</div>' +
        '<div class="oo-acts">' + acts + '</div></div>';
    }).join('');
  }

  window.toggleOnlineOrderDetail = function (oid) {
    var o = (__onlineOrdersCache || []).find(function (x) { return String(x.id) === String(oid); });
    var cur = __ooOpen[oid] != null ? !!__ooOpen[oid] : (o ? !isOnlineOrderDone(o) : false);
    __ooOpen[oid] = !cur;
    renderOnlineOrdersList();
  };

  window.updateOnlineOrderStatusClick = async function (oid, st) {
    showLoading(true);
    try {
      await api.call('updateOnlineOrderStatus', oid, st);
      if (st.indexOf('Hoàn thành') >= 0 || st.indexOf('Hủy') >= 0) {
        try { localStorage.removeItem('sun_pos_check_' + oid); } catch (eC) { }
      }
      showToast('✅ ' + oid + ' → ' + st);
      await loadOnlineOrdersModal();
      await refreshOnlineOrdersBadge();
    } catch (e) {
      showToast('⚠️ ' + (e.message || e));
    }
    showLoading(false);
  };

  async function loadOnlineOrdersModal() {
    var r = await api.call('getOnlineOrdersForAdmin', 40);
    __onlineOrdersCache = normalizeOnlineOrders((r && r.orders) || []);
    renderOnlineOrdersList();
  }

  window.openOnlineOrdersModal = async function () {
    document.getElementById('onlineOrdersModal').classList.add('open');
    updateLabelPrinterUi();
    initLabelPrinterAndroidTip();
    // Android: tự thử kết nối lại máy in đã cấp quyền (không hiện popup chọn thiết bị)
    if (navigator.bluetooth && navigator.bluetooth.getDevices) {
      tryReconnectLabelPrinter(true).then(function (ok) {
        if (ok) updateLabelPrinterUi();
      });
    }
    showLoading(true);
    try { await loadOnlineOrdersModal(); } catch (e) { showToast('⚠️ Không tải đơn online'); }
    showLoading(false);
  };
  window.closeOnlineOrdersModal = function () {
    document.getElementById('onlineOrdersModal').classList.remove('open');
  };

  async function loadGiaoMemberModal() {
    var r = await api.call('getMemberDeliveriesTodayEnriched');
    var list = (r && r.deliveries) || [];
    var dateEl = document.getElementById('giao-member-date');
    if (dateEl) dateEl.textContent = r.dateLabel || 'Hôm nay';
    var box = document.getElementById('giao-member-list');
    if (!box) return;
    if (!list.length) { box.innerHTML = '<p style="color:var(--text-3);">Không có giao gói hôm nay.</p>'; return; }
    box.innerHTML = list.map(function (d) {
      var tel = String(d.phone || '').replace(/\D/g, '');
      var sms = encodeURIComponent(d.smsBody || '');
      return '<div class="card" style="margin-bottom:10px;padding:12px;border:1px solid var(--border);border-radius:12px;">' +
        '<div style="font-weight:900;font-size:14px;">' + escHtml(d.customerName) + '</div>' +
        '<p style="margin:4px 0;font-size:12px;"><i class="fa-solid fa-phone"></i> <a href="tel:' + tel + '">' + escHtml(d.phone) + '</a> · Mã ' + escHtml(d.memberCode) + '</p>' +
        '<p style="margin:0 0 4px;font-size:12px;"><i class="fa-solid fa-mug-hot"></i> ' + escHtml(d.drinkToday || d.milkProduct) + ' · ' + escHtml(d.timeSlot || '7:00–8:30') + '</p>' +
        '<p style="margin:0 0 8px;font-size:12px;color:var(--text-3);"><i class="fa-solid fa-location-dot"></i> ' + escHtml(d.fulfillment) + (d.address ? (' — ' + escHtml(d.address)) : '') + '</p>' +
        '<div style="display:flex;flex-wrap:wrap;gap:6px;">' +
        '<a class="btn" style="padding:8px 12px;font-size:11px;text-decoration:none;" href="tel:' + tel + '"><i class="fa-solid fa-phone"></i> Gọi</a>' +
        '<a class="btn btn-sec" style="padding:8px 12px;font-size:11px;text-decoration:none;" href="sms:' + tel + '?body=' + sms + '"><i class="fa-solid fa-comment-sms"></i> SMS</a>' +
        '</div></div>';
    }).join('');
  }

  window.openGiaoMemberModal = async function () {
    document.getElementById('giaoMemberModal').classList.add('open');
    showLoading(true);
    try { await loadGiaoMemberModal(); } catch (e) { showToast('⚠️ Không tải Giao Member'); }
    showLoading(false);
  };
  window.closeGiaoMemberModal = function () {
    document.getElementById('giaoMemberModal').classList.remove('open');
  };

  // ====== BOOT ======
  var _posBooted = false;
  function bootPos() {
    if (_posBooted) return;
    _posBooted = true;
    try {
      if (typeof window.speechSynthesis !== 'undefined') {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = function () { try { window.speechSynthesis.getVoices(); } catch (eV) { } };
      }
    } catch (eVo) { }
    try { loadData(); } catch (e) { menuData = getFallbackMenu(); renderMenu(); renderCategories(); }
    refreshOnlineOrdersBadge();
    setInterval(refreshOnlineOrdersBadge, 45000);
    updateLabelPrinterUi();
    if (navigator.bluetooth && navigator.bluetooth.getDevices) {
      tryReconnectLabelPrinter(true).then(function (ok) { if (ok) updateLabelPrinterUi(); });
    }
  }
  window.__SUN_POS_BOOT__ = bootPos;
  if (document.readyState === 'complete') {
    bootPos();
  } else {
    window.addEventListener('load', bootPos);
  }
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      const g = document.getElementById('products-grid');
      if (g && (g.children.length === 0 || g.querySelector('.skel-img'))) { menuData = getFallbackMenu(); renderMenu(); renderCategories(); }
    }, 12000);
  });
</script>
