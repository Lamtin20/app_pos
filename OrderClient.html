<script>
  var SCRIPT_URL = typeof window.__SUN_POS_URL__ === 'string' ? window.__SUN_POS_URL__ : '';

  function sunImg(url, w) {
    var u = String(url || '').trim();
    if (!u) return '';
    if (u.indexOf('drive.google.com') >= 0) {
      var m = u.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w' + (w || 480);
    }
    if (u.indexOf('unsplash.com') >= 0) return u.replace(/\?.*$/, '') + '?w=' + (w || 480) + '&q=72&auto=format';
    return u;
  }

  function defaultToppingsForCategory(cat) {
    var c = String(cat || '').toLowerCase();
    if (c.indexOf('sữa hạt') >= 0 || c.indexOf('mix') >= 0) {
      return [
        { name: 'Đường', price: 0 },
        { name: 'Sữa đặc', price: 3000 },
        { name: 'Không thêm topping', price: 0, noTopping: true },
      ];
    }
    if (c.indexOf('coffee') >= 0 || c.indexOf('matcha') >= 0) {
      return [
        { name: 'Thêm sữa', price: 5000 },
        { name: 'Không thêm topping', price: 0, noTopping: true },
      ];
    }
    return [{ name: 'Không thêm topping', price: 0, noTopping: true }];
  }

  function productToppings(p) {
    if (!p) return [];
    if (Array.isArray(p.toppings) && p.toppings.length) return p.toppings;
    return defaultToppingsForCategory(p.category);
  }
  (function () {
    var U = '__SUN_FAVICON_URL__';
    if (!window.SUN_FAVICON_URL) window.SUN_FAVICON_URL = U;
    if (typeof window.setFaviconUrl !== 'function') {
      window.setFaviconUrl = function (url) {
        var u = url || window.SUN_FAVICON_URL || U;
        function ensure(rel, mime) {
          var link = document.querySelector('link[rel="' + rel + '"]');
          if (!link) {
            link = document.createElement('link');
            link.rel = rel;
            if (mime) link.type = mime;
            document.head.appendChild(link);
          }
          link.href = u;
        }
        ensure('icon', 'image/png');
        ensure('apple-touch-icon', null);
      };
    }
    window.setFaviconUrl(window.SUN_FAVICON_URL);
  })();

  // ====== API WRAPPER ======
  const api = {
    call: function (method) {
      var args = Array.prototype.slice.call(arguments, 1);
      if (window.SUN_API && window.SUN_API.api) {
        return window.SUN_API.api.apply(null, [method].concat(args));
      }
      return new Promise(function (resolve, reject) {
        var timeout = setTimeout(function () { reject(new Error('⏱️ Timeout')); }, 30000);
        try {
          var runner = google.script.run
            .withSuccessHandler(function (r) { clearTimeout(timeout); resolve(r); })
            .withFailureHandler(function (e) { clearTimeout(timeout); reject(e); });
          runner[method].apply(runner, args);
        } catch (e) { clearTimeout(timeout); reject(e); }
      });
    },
    callLong: function (method, ms) {
      var args = Array.prototype.slice.call(arguments, 2);
      if (window.SUN_API && window.SUN_API.apiLong) {
        return window.SUN_API.apiLong.apply(null, [method, ms || 90000].concat(args));
      }
      var wait = ms || 90000;
      return new Promise(function (resolve, reject) {
        var timeout = setTimeout(function () { reject(new Error('⏱️ Timeout')); }, wait);
        try {
          var runner = google.script.run
            .withSuccessHandler(function (r) { clearTimeout(timeout); resolve(r); })
            .withFailureHandler(function (e) { clearTimeout(timeout); reject(e); });
          runner[method].apply(runner, args);
        } catch (e) { clearTimeout(timeout); reject(e); }
      });
    }
  };

  function showSheetStatus(kind, msg) {
    var el = document.getElementById('sheet-sync-banner');
    if (!el) {
      el = document.createElement('div');
      el.id = 'sheet-sync-banner';
      el.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 18px;border-radius:999px;font-size:12px;font-weight:700;box-shadow:0 8px 24px rgba(60,40,25,.15);transition:opacity .35s,transform .35s;pointer-events:none;';
      document.body.appendChild(el);
    }
    if (kind === 'hide') {
      el.style.opacity = '0';
      el.style.transform = 'translateX(-50%) translateY(-8px)';
      return;
    }
    var styles = {
      loading: 'background:#fff7ed;color:#9a3412;border:1px solid rgba(154,52,18,.2);',
      ok: 'background:#ecfdf5;color:#15803d;border:1px solid rgba(21,128,61,.25);',
      err: 'background:#fef2f2;color:#b91c1c;border:1px solid rgba(185,28,28,.2);'
    };
    el.style.cssText += styles[kind] || styles.loading;
    el.style.opacity = '1';
    el.style.transform = 'translateX(-50%) translateY(0)';
    el.innerHTML = msg;
    if (kind === 'ok') setTimeout(function () { showSheetStatus('hide'); }, 2200);
  }

  // ====== STATE ======
  let menuData = [], inventoryData = [], customersData = [], promotionsData = [];
  /** Tồn kho theo tên nguyên liệu (getStockReportAdvanced) */
  var stockByName = {};
  var stockByKey = {};
  var stockReady = false;
  /** Danh sách Mix Hạt (Admin cấu hình) */
  var mixHatList = [];
  // Display/Kiosk/Pickup đã được gỡ bỏ theo yêu cầu
  let cart = [];
  let currentProduct = null, currentQty = 1;
  let currentOptions = {
    size: 'Thường (350ml)', sizePrice: 0, ice: 'Vừa', sweetness: 'Ngọt vừa', addons: [], addonPrices: [],
    serveTemp: 'cold_steep', packaging: 'paper', packagingPrice: 0
  };
  var lastPromoDigestCache = null;
  let promoDiscount = 0, pointsDiscount = 0;
  let currentCustomer = null, selectedPayment = 'cash';
  let currentOrderData = null, currentOrderId = null, currentFinalAmount = 0;
  /** Đơn đang chờ CK — khi thành công chỉ phát ting, không đọc số tiền. */
  var lastPaymentWasTransfer = false;
  var invoiceSettings = {};
  var printInvoiceWhenPaid = false;
  // Pickup đã được gỡ bỏ theo yêu cầu
  let selectedGoal = '', activeCategory = 'Tất cả';
  let orderCounter = Math.floor(Math.random() * 9000) + 1000;
  let mobileTab = 'menu';
  var salesOrderPeriod = 'today';
  var orderHistoryModalCache = [];
  var orderHistoryPeriod = 'today';
  var __sunPhoneLookupSeq = 0;

  function normalizeVnPhoneDigitsClient(val) {
    var d = String(val || '').replace(/\D/g, '');
    if (!d) return '';
    if (d.indexOf('84') === 0 && d.length >= 10) d = '0' + d.slice(2);
    if (d.length === 9 && d.charAt(0) !== '0') d = '0' + d;
    return d;
  }

  function normNameKey(s) {
    return String(s || '')
      .toLowerCase()
      .replace(/\s+/g, ' ')
      .trim();
  }

  function applyCustomerInsightToUI(ins) {
    if (!ins || !ins.ok) return;
    var ex = document.getElementById('cust-insight-extras');
    // tối ưu tốc độ: chỉ hiển thị tên + sđt (+ điểm nếu có), không quét thống kê ly/doanh thu
    var tierEl = document.getElementById('cust-tier-label');
    var ptsEl = document.getElementById('cust-points-label');
    if (tierEl) tierEl.textContent = ins.found ? 'Khách' : 'Khách mới';
    if (ptsEl) ptsEl.textContent = (ins.points || 0) + ' điểm';
    if (ex) ex.classList.remove('show');
    document.getElementById('customer-info-bar').classList.add('show');
  }

  function closeOrderHistoryModal(e) {
    if (e && e.target !== e.currentTarget) return;
    var m = document.getElementById('orderHistoryModal');
    if (m) m.classList.remove('open');
  }
  function openOrderHistoryModal() {
    var m = document.getElementById('orderHistoryModal');
    if (!m) return;
    sunModalRaise('orderHistoryModal');
    m.classList.add('open');
    changeOrderHistoryPeriod(orderHistoryPeriod || 'today', null);
  }
  function changeOrderHistoryPeriod(p, btn) {
    orderHistoryPeriod = p || 'today';
    document.querySelectorAll('#orderHistoryModal .sales-period-btn').forEach(function (b) { b.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    else {
      var id = p === 'week' ? 'hist-p-week' : (p === 'month' ? 'hist-p-month' : 'hist-p-today');
      var el = document.getElementById(id);
      if (el) el.classList.add('active');
    }
    refreshOrderHistoryModalBody();
  }
  async function refreshOrderHistoryModalBody() {
    var el = document.getElementById('order-history-list-body');
    if (!el) return;
    el.innerHTML = 'Đang tải...';
    try {
      var list = await api.callLong('getOrders', 45000, orderHistoryPeriod);
      orderHistoryModalCache = list && list.length ? list.slice().reverse() : [];
      if (!orderHistoryModalCache.length) {
        el.innerHTML = '<span style="color:var(--text-3);">Không có đơn trong kỳ.</span>';
        return;
      }
      el.innerHTML = orderHistoryModalCache.map(function (o, idx) {
        var st = esc(String(o.status || ''));
        var day = o.time ? new Date(o.time).toLocaleString('vi-VN') : '';
        var items = (o.items || []).map(function (i) { return (parseInt(i.quantity, 10) || 1) + '×' + esc(i.name || ''); }).join(', ');
        return '<div class="ph-modal-row" onclick="openOrderDetailFromHistory(' + idx + ')"><div style="font-weight:800;color:var(--primary-dk);">' + esc(String(o.orderId || '')) + ' · ' + fmt(o.finalAmount || 0) + '</div><div style="font-size:11px;color:var(--text-3);">' + day + ' · ' + esc(String(o.customerName || '-')) + ' · ' + st + '</div><div style="font-size:11px;margin-top:4px;">' + items + '</div></div>';
      }).join('');
    } catch (err) {
      el.innerHTML = '<span style="color:var(--red);">Không tải được - thử lại.</span>';
    }
  }
  function openOrderDetailFromHistory(idx) {
    var o = orderHistoryModalCache[idx];
    if (!o) return;
    var body = document.getElementById('order-detail-body');
    var title = document.getElementById('order-detail-title');
    if (title) title.textContent = esc(String(o.orderId || ''));
    if (!body) return;
    var pay = esc(String(o.paymentMethod || '-'));
    var note = esc(String(o.note || ''));
    var lines = (o.items || []).map(function (i) {
      var sz = i.options && i.options.size ? ' (' + esc(String(i.options.size)) + ')' : '';
      return '<div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:6px;"><span>' + (parseInt(i.quantity, 10) || 1) + '× ' + esc(i.name || '') + sz + '</span><strong>' + fmt(parseFloat(i.totalPrice) || 0) + '</strong></div>';
    }).join('');
    body.innerHTML = '<div style="margin-bottom:10px;"><strong>Thời gian:</strong> ' + (o.time ? new Date(o.time).toLocaleString('vi-VN') : '-') + '</div>' +
      '<div style="margin-bottom:6px;"><strong>Khách:</strong> ' + esc(String(o.customerName || '-')) + ' · <strong>SĐT:</strong> ' + esc(String(o.customerPhone || '-')) + '</div>' +
      '<div style="margin-bottom:6px;"><strong>Trạng thái:</strong> ' + esc(String(o.status || '')) + '</div>' +
      '<div style="margin-bottom:6px;"><strong>Thanh toán:</strong> ' + pay + '</div>' +
      (note ? '<div style="margin-bottom:10px;font-size:12px;"><strong>Ghi chú:</strong> ' + note + '</div>' : '') +
      '<div style="font-weight:700;margin:10px 0 6px;">Món</div>' + (lines || '<span>Không có dòng món</span>') +
      '<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border2);display:flex;justify-content:space-between;"><span>Tạm tính</span><strong>' + fmt(o.totalAmount || 0) + '</strong></div>' +
      '<div style="display:flex;justify-content:space-between;"><span>Giảm giá</span><strong>' + fmt(o.discount || 0) + '</strong></div>' +
      '<div style="display:flex;justify-content:space-between;font-size:15px;margin-top:6px;color:var(--primary-dk);"><span>Thực thu</span><strong>' + fmt(o.finalAmount || 0) + '</strong></div>';
    var dm = document.getElementById('orderDetailModal');
    if (dm) {
      sunModalRaise('orderDetailModal');
      dm.classList.add('open');
    }
  }
  function closeOrderDetailModal(e) {
    if (e && e.target !== e.currentTarget) return;
    var m = document.getElementById('orderDetailModal');
    if (m) m.classList.remove('open');
  }
  /** Đưa modal lên trên cùng (tránh popup mới bị chìm dưới popup cũ). */
  function sunModalRaise(id) {
    if (!window.__sunModalZ) window.__sunModalZ = 4200;
    window.__sunModalZ += 3;
    var el = document.getElementById(id);
    if (el) el.style.zIndex = String(window.__sunModalZ);
  }
  function openCustomerLookupModal() {
    var m = document.getElementById('customerLookupModal');
    var inp = document.getElementById('lookup-modal-phone');
    var body = document.getElementById('lookup-modal-body');
    if (!m) return;
    if (inp) inp.value = '';
    if (body) body.innerHTML = '<span style="color:var(--text-3);">Nhập SĐT và bấm Tra cứu.</span>';
    sunModalRaise('customerLookupModal');
    m.classList.add('open');
  }
  function closeCustomerLookupModal(e) {
    if (e && e.target !== e.currentTarget) return;
    var mod = document.getElementById('customerLookupModal');
    if (mod) mod.classList.remove('open');
  }
  async function runCustomerLookupFromModal() {
    var inp = document.getElementById('lookup-modal-phone');
    var body = document.getElementById('lookup-modal-body');
    if (!inp || !body) return;
    var ph = normalizeVnPhoneDigitsClient(inp.value);
    if (ph.length < 9) {
      showToast('⚠️ Nhập SĐT hợp lệ');
      return;
    }
    body.innerHTML = 'Đang tra cứu...';
    try {
      await api.call('ensureCustomerForPos', ph, '');
      var insRows = await Promise.all([
        api.call('getPosCustomerInsight', ph),
        api.call('getOrdersByPhone', ph, 40)
      ]);
      var ins = insRows[0];
      var rows = insRows[1];
      var summary = '';
      if (ins && ins.ok) {
        summary = '<div style="padding:10px;background:var(--surface2);border-radius:10px;margin-bottom:12px;border:1px solid var(--border);">' +
          '<strong>' + (ins.isReturningBuyer ? 'Khách quen' : 'Khách mới') + '</strong> · ' + (ins.completedOrders || 0) + ' đơn hoàn thành<br>' +
          'Điểm tích (sheet): <strong>' + (ins.points || 0) + '</strong> · Hạng: <strong>' + esc(String(ins.tier || '')) + '</strong><br>' +
          'Hôm nay: ' + (ins.cupsToday || 0) + ' ly · ' + fmt(ins.revenueToday || 0) +
          ' · Tuần: ' + (ins.cupsWeek || 0) + ' ly · ' + fmt(ins.revenueWeek || 0) +
          ' · Tháng: ' + (ins.cupsMonth || 0) + ' ly · ' + fmt(ins.revenueMonth || 0) + '</div>';
      }
      if (!rows || !rows.length) {
        body.innerHTML = summary + '<p>Chưa có đơn cho SĐT này (kiểm tra cột SĐT trên sheet Order/Orders có trùng định dạng không).</p>';
        return;
      }
      window.__lookupOrderCache = rows.slice();
      body.innerHTML = summary + '<div style="font-weight:700;margin-bottom:8px;">Đơn gần đây</div>' + rows.map(function (o, idx) {
        var day = o.time ? new Date(o.time).toLocaleString('vi-VN') : '';
        var items = (o.items || []).map(function (i) { return (parseInt(i.quantity, 10) || 1) + '×' + esc(i.name || ''); }).join('; ');
        return '<div class="ph-modal-row" onclick="openOrderDetailFromLookup(' + idx + ')"><div style="font-weight:700;">' + esc(String(o.orderId || '')) + ' · ' + fmt(o.finalAmount || 0) + ' · ' + esc(String(o.status || '')) + '</div><div style="font-size:11px;color:var(--text-3);">' + day + '</div><div style="font-size:11px;margin-top:4px;">' + items + '</div></div>';
      }).join('');
    } catch (e2) {
      body.innerHTML = '<span style="color:var(--red);">Lỗi tra cứu.</span>';
    }
  }
  function openOrderDetailFromLookup(idx) {
    var rows = window.__lookupOrderCache;
    if (!rows || !rows[idx]) return;
    orderHistoryModalCache = rows;
    sunModalRaise('orderDetailModal');
    openOrderDetailFromHistory(idx);
  }

  var membershipPackagesCache = [];
  function openMembershipModal() {
    var m = document.getElementById('membershipModal');
    if (!m) return;
    m.classList.add('open');
    refreshMembershipModal();
  }
  function closeMembershipModal() {
    var m = document.getElementById('membershipModal');
    if (m) m.classList.remove('open');
  }
  async function refreshMembershipModal() {
    var box = document.getElementById('membership-pkg-cards');
    var sel = document.getElementById('mem-reg-pkg');
    if (box) box.innerHTML = '<span style="color:var(--text-3);font-size:12px;">Đang tải gói...</span>';
    try {
      var pkgs = await api.call('getMembershipPackages');
      membershipPackagesCache = Array.isArray(pkgs) ? pkgs : [];
      if (box) {
        if (!membershipPackagesCache.length) {
          box.innerHTML = '<span style="color:var(--text-3);font-size:12px;">Chưa có gói - Admin → Gói TV để khai báo.</span>';
        } else {
          box.innerHTML = membershipPackagesCache.map(function (p) {
            var isW = String(p.type || '').indexOf('Tuần') >= 0;
            return '<div style="border-radius:12px;padding:12px;border:1.5px solid var(--border2);background:linear-gradient(145deg,' + (isW ? 'rgba(234,88,12,.12)' : 'rgba(34,197,94,.12)') + ',var(--surface2));">' +
              '<div style="font-size:10px;font-weight:800;color:var(--text-3);text-transform:uppercase;">' + esc(String(p.type || '')) + '</div>' +
              '<div style="font-weight:800;font-size:14px;margin:4px 0;color:var(--primary-dk);">' + esc(p.name || '') + '</div>' +
              '<div style="font-size:18px;font-weight:900;color:var(--primary);">' + fmt(p.price || 0) + '</div>' +
              '<div style="font-size:11px;color:var(--text-3);margin-top:4px;">' + (p.sessions || 0) + ' buổi · ' + esc(String(p.milkProduct || '').slice(0, 40)) + '</div></div>';
          }).join('');
        }
      }
      if (sel) {
        sel.innerHTML = membershipPackagesCache.map(function (p) {
          return '<option value="' + esc(String(p.id || '')) + '">' + esc(p.name || p.id) + ' - ' + fmt(p.price || 0) + '</option>';
        }).join('');
      }
      var drinkSel = document.getElementById('mem-reg-drink');
      if (drinkSel && Array.isArray(menuData) && menuData.length) {
        var cur = drinkSel.value;
        drinkSel.innerHTML = '<option value="">Món yêu thích - theo menu / mặc định</option>' +
          menuData.filter(function (p) { return p.available !== false; }).map(function (p) {
            return '<option value="' + escAttr(p.name) + '">' + esc(p.name) + '</option>';
          }).join('');
        if (cur) drinkSel.value = cur;
      }
    } catch (e) {
      if (box) box.innerHTML = '<span style="color:var(--red);font-size:12px;">Không tải được gói.</span>';
    }
  }
  async function runMembershipLookup() {
    var inp = document.getElementById('mem-lookup-phone');
    var body = document.getElementById('mem-lookup-body');
    if (!inp || !body) return;
    var ph = normalizeVnPhoneDigitsClient(inp.value);
    if (ph.length < 9) { showToast('⚠️ Nhập SĐT'); return; }
    body.innerHTML = 'Đang tra cứu...';
    try {
      var r = await api.callLong('lookupMembershipByPhone', 45000, ph);
      if (!r || !r.ok) {
        body.innerHTML = '<span style="color:var(--red);">' + esc(String((r && r.message) || 'Lỗi')) + '</span>';
        return;
      }
      var list = r.list || [];
      if (!list.length) {
        body.innerHTML = '<span style="color:var(--text-3);">Chưa có gói đăng ký cho SĐT này.</span>';
        return;
      }
      body.innerHTML = list.map(function (s) {
        var left = (s.daysLeft != null) ? (s.daysLeft + ' ngày') : '-';
        var ml = s.mapLink ? '<div style="margin-top:6px;"><a href="' + esc(s.mapLink) + '" target="_blank" rel="noopener" style="color:var(--primary);font-weight:700;">Mở Google Maps</a></div>' : '';
        return '<div style="border:1px solid var(--border2);border-radius:10px;padding:10px;margin-bottom:8px;background:var(--surface2);">' +
          '<div style="font-weight:800;">' + esc(s.packageId || '') + ' · ' + esc(String(s.type || '')) + '</div>' +
          '<div style="font-size:11px;margin-top:4px;">Còn lại: <strong>' + left + '</strong> · Hạng: <strong>' + esc(String(s.tier || '')) + '</strong> · TT: ' + esc(String(s.status || '')) + '</div>' +
          '<div style="font-size:11px;margin-top:4px;color:var(--text-3);">' + esc(s.address || 'Chưa có địa chỉ') + '</div>' + ml + '</div>';
      }).join('');
    } catch (e2) {
      var em = (e2 && e2.message) ? e2.message : (e2 ? String(e2) : 'Lỗi tra cứu');
      body.innerHTML = '<span style="color:var(--red);">' + esc(em) + '</span>';
    }
  }
  async function submitMembershipRegister() {
    var phone = normalizeVnPhoneDigitsClient(document.getElementById('mem-reg-phone') && document.getElementById('mem-reg-phone').value);
    var name = (document.getElementById('mem-reg-name') && document.getElementById('mem-reg-name').value) || '';
    var province = (document.getElementById('mem-reg-province') && document.getElementById('mem-reg-province').value) || '';
    var ward = (document.getElementById('mem-reg-ward') && document.getElementById('mem-reg-ward').value) || '';
    var addrDetail = (document.getElementById('mem-reg-addr-detail') && document.getElementById('mem-reg-addr-detail').value) || '';
    var landmark = (document.getElementById('mem-reg-landmark') && document.getElementById('mem-reg-landmark').value) || '';
    var fav = (document.getElementById('mem-reg-drink') && document.getElementById('mem-reg-drink').value) || '';
    var mapL = (document.getElementById('mem-reg-map') && document.getElementById('mem-reg-map').value) || '';
    var pkg = document.getElementById('mem-reg-pkg') && document.getElementById('mem-reg-pkg').value;
    if (phone.length < 9) { showToast('⚠️ SĐT không hợp lệ'); return; }
    if (!pkg) { showToast('⚠️ Chọn gói'); return; }
    if (!String(addrDetail).trim()) { showToast('⚠️ Nhập địa chỉ nhà (số nhà, đường…)'); return; }
    var payEl = document.querySelector('input[name="mem-pay"]:checked');
    var payMeth = payEl ? payEl.value : 'Tiền mặt';
    try {
      var r = await api.call('registerMembershipSubscription', {
        phone: phone,
        customerName: name,
        packageId: pkg,
        province: province,
        ward: ward,
        addressDetail: addrDetail.trim(),
        landmark: landmark,
        favoriteDrink: fav,
        mapLink: mapL,
        note: 'POS',
        paymentMethod: payMeth
      });
      if (r && r.ok) {
        if (r.payByTransfer) {

  // ====== INIT ======
  async function loadData() {
    renderSkeletons();
    showSheetStatus('loading', '<i class="fa-solid fa-circle-notch fa-spin"></i> Đang đồng bộ Google Sheet…');
    try {
      var fastMixP = api.callLong('getMixHats', 20000, false);

      const [menuResult, invResult, digestResult] = await Promise.allSettled([
        api.call('getMenu'),
        api.call('getInventory'),
        api.call('getTodayPromoDigest')
      ]);
      var menuFromSheet = menuResult.status === 'fulfilled' && Array.isArray(menuResult.value) ? menuResult.value : null;
      menuData = menuFromSheet && menuFromSheet.length ? menuFromSheet : getFallbackMenu();
      if (menuFromSheet && !menuFromSheet.length) {
        showToast('⚠️ Sheet Menu trống — đang dùng menu mẫu');
      }
      inventoryData = invResult.status === 'fulfilled' && invResult.value ? invResult.value : [];
      renderMenu(); renderCategories();
      if (menuResult.status === 'rejected') {
        showSheetStatus('err', '⚠️ Chưa kết nối Sheet — <a href="/?setup=1" style="color:inherit;text-decoration:underline;margin-left:6px;">Setup</a>');
        showToast('⚠️ ' + (menuResult.reason && menuResult.reason.message ? menuResult.reason.message : 'Không tải được menu — vào trang chủ Setup'));
      } else {
        showSheetStatus('ok', '✅ Đã tải ' + menuData.length + ' món từ Google Sheet');
      }
      if (digestResult.status === 'fulfilled' && digestResult.value) renderHeaderPromoDigest(digestResult.value);
      else {
        lastPromoDigestCache = { activePromos: [], ordersWithPromoToday: 0, totalPromoCostToday: 0 };
        var hint0 = document.getElementById('header-promo-hint');
        if (hint0) hint0.textContent = '';
        var badge0 = document.getElementById('header-promo-badge');
        if (badge0) badge0.style.display = 'none';
        var btn0 = document.getElementById('btn-open-promo');
        if (btn0) btn0.style.display = '';
      }
      try {
        var invS = await api.call('getInvoicePrintSettings');
        invoiceSettings = invS && typeof invS === 'object' ? invS : {};
      } catch (eInv) {
        invoiceSettings = {};
      }
      // Lấy MixHat nhanh trước (cache)
      mixHatList = [];
      try {
        var fastMix = await fastMixP;
        mixHatList = Array.isArray(fastMix) ? fastMix : [];
      } catch (eFastMix) { mixHatList = []; }
      try { refreshNutMixIfOpen(); } catch (eMix0) { }

      // Các data khác (và refresh MixHat bỏ cache để chính xác)
      const results = await Promise.allSettled([
        api.call('getCustomers'),
        api.call('getPromotions'),
        // Bỏ cache để MixHat cập nhật ngay sau khi admin chỉnh
        api.callLong('getMixHats', 45000, true)
      ]);
      var c = results[0], p = results[1], st = results[2];
      customersData = c.status === 'fulfilled' && c.value ? c.value : [];
      promotionsData = p.status === 'fulfilled' && p.value ? p.value : [];
      if (st.status === 'fulfilled' && Array.isArray(st.value)) mixHatList = st.value;
      // Nếu đang mở modal món, cập nhật lại chips Mix hạt ngay khi list về
      try { refreshNutMixIfOpen(); } catch (eMix) { }
    } catch (e) {
      menuData = getFallbackMenu();
      renderMenu(); renderCategories();
      showSheetStatus('err', '⚠️ Lỗi kết nối Sheet');
      showToast('⚠️ ' + (e && e.message ? e.message : 'Lỗi tải dữ liệu'));
    }
  }

  function getCatIcon(cat) {

      'Matcha': '🍵',
      'Coffee': '☕',

      'Sữa đơn': '🥛',
      'Sữa Mix': '🌰',

      'Nổi bật': '🔥',
      'Đặc biệt': '⭐',
      'Sữa đặc biệt': '💎',
    };
    var lc = String(cat || '').toLowerCase();
    if (lc.indexOf('matcha') >= 0) return '🍵';
    if (lc.indexOf('coffee') >= 0 || lc.indexOf('cafe') >= 0) return '☕';

  function getEmoji(p) {
    if (!p) return '🥛';
    const n = (p.name || '').toLowerCase();
    if (n.includes('điều')) return '🥜';
    if (n.includes('óc chó')) return '🪨';
    if (n.includes('hạnh nhân')) return '🌰';
    if (n.includes('macca')) return '🌰';
    if (n.includes('hoa hồng')) return '🌹';
    if (n.includes('detox')) return '🌿';
    if (n.includes('mix') || (p.category || '').toLowerCase().includes('mix')) return '🌾';
    if ((p.category || '').toLowerCase().includes('topping')) return '✨';
    if (n.includes('đậu')) return '🫘';
    return '🥛';
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function filterCategory(c) { activeCategory = c; renderCategories(); renderMenu(); }

  function quickAddByIndex(i) { if (menuData[i]) quickAdd(menuData[i]); }

  function escWithBr(s) {
    return String(s || '').split('\n').map(function (line) { return esc(line); }).join('<br>');
  }
  function textNeedsExpandMore(s) {
    s = String(s || '').trim();
    if (!s) return false;
    if (s.length > 110) return true;
    if ((s.match(/\n/g) || []).length >= 2) return true;
    return false;
  }
  function previewPlainText(s) {
    var t = String(s || '').replace(/\s+/g, ' ').trim();
    if (t.length <= 110) return t;
    var cut = 110;
    var sp = t.lastIndexOf(' ', 110);
    if (sp > 55) cut = sp;
    return t.slice(0, cut) + '…';
  }
  function buildExpandableTextCard(title, fullRaw) {
    var full = String(fullRaw || '').trim();
    if (!full) return '';
    if (!textNeedsExpandMore(full)) {
      return '<div class="pd-meta-card"><div class="pd-meta-t">' + esc(title) + '</div><div class="pd-meta-b">' + escWithBr(full) + '</div></div>';
    }
    var prev = full.indexOf('\n') >= 0 ? (full.split('\n')[0].trim() + '…') : previewPlainText(full);
    return '<div class="pd-meta-card pd-desc-card" data-expanded="0">' +
      '<div class="pd-meta-t">' + esc(title) + '</div>' +
      '<div class="pd-desc-preview">' + esc(prev) + '</div>' +
      '<div class="pd-desc-full" style="display:none">' + escWithBr(full) + '</div>' +
      '<button type="button" class="pd-desc-toggle-btn">Xem thêm</button></div>';
  }
  function buildPrimaryNarrativeCard(title, fullRaw, hasExtra) {
    var full = String(fullRaw || '').trim();
    if (!full) return '';
    if (!hasExtra) {
      return buildExpandableTextCard(title, fullRaw);
    }
    if (textNeedsExpandMore(full)) {
      var prev = full.indexOf('\n') >= 0 ? (full.split('\n')[0].trim() + '…') : previewPlainText(full);
      return '<div class="pd-meta-card pd-desc-card pd-primary-desc" data-expanded="0">' +
        '<div class="pd-meta-t">' + esc(title) + '</div>' +
        '<div class="pd-desc-preview">' + esc(prev) + '</div>' +
        '<div class="pd-desc-full" style="display:none">' + escWithBr(full) + '</div></div>';
    }
    return '<div class="pd-meta-card"><div class="pd-meta-t">' + esc(title) + '</div><div class="pd-meta-b">' + escWithBr(full) + '</div></div>';
  }
  function wireProductDetailMetaReveal(box) {
    var revealBtn = document.getElementById('pd-meta-reveal-btn');
    var extraEl = document.getElementById('product-detail-meta-extra');
    if (!box || !revealBtn || !extraEl) return;
    revealBtn.addEventListener('click', function () {
      var expanded = box.getAttribute('data-detail-expanded') === '1';
      expanded = !expanded;
      box.setAttribute('data-detail-expanded', expanded ? '1' : '0');
      extraEl.style.display = expanded ? 'block' : 'none';
      revealBtn.textContent = expanded ? 'Thu gọn' : 'Xem thêm';
      var primaryDesc = box.querySelector('.pd-primary-desc');
      if (primaryDesc) {
        var prev = primaryDesc.querySelector('.pd-desc-preview');
        var full = primaryDesc.querySelector('.pd-desc-full');
        if (prev && full) {
          prev.style.display = expanded ? 'none' : '';
          full.style.display = expanded ? '' : 'none';
        }
      }
    });
  }
  function wireProductDetailDescToggles(box) {
    if (!box) return;
    var extraWrap = box.querySelector('.pd-meta-extra-wrap');
    var btns = extraWrap
      ? extraWrap.querySelectorAll('.pd-desc-card .pd-desc-toggle-btn')
      : box.querySelectorAll('.pd-desc-card .pd-desc-toggle-btn');
    for (var bi = 0; bi < btns.length; bi++) {
      btns[bi].addEventListener('click', function (ev) {
        var btn = ev.currentTarget;
        var card = btn.closest('.pd-desc-card');
        if (!card) return;
        var expanded = card.getAttribute('data-expanded') === '1';
        expanded = !expanded;
        card.setAttribute('data-expanded', expanded ? '1' : '0');
        var prev = card.querySelector('.pd-desc-preview');
        var full = card.querySelector('.pd-desc-full');
        if (prev) prev.style.display = expanded ? 'none' : '';
        if (full) full.style.display = expanded ? '' : 'none';
        btn.textContent = expanded ? 'Thu gọn' : 'Xem thêm';
      });
    }
  }
  function renderProductDetailMeta(p) {

        (k ? '<span class="product-detail-pill"><i class="fa-solid fa-fire-flame-simple" aria-hidden="true"></i> Calo ~' + esc(String(k)) + '</span>' : '') +
        (pr ? '<span class="product-detail-pill"><i class="fa-solid fa-drumstick-bite" aria-hidden="true"></i> Protein ~' + esc(String(pr)) + 'g</span>' : '') +

      );

    if (benCust) {
      extraParts.push('<div class="pd-meta-card"><div class="pd-meta-t">Công dụng</div><div class="pd-meta-b">' + esc(benCust) + '</div></div>');

      extraParts.push('<div class="pd-meta-card" style="border-style:dashed;opacity:0.96;"><div class="pd-meta-t">Tham khảo thêm</div><div class="pd-meta-b">' + esc(benAdm) + '</div></div>');

      primary = '<div class="pd-meta-card pd-meta-muted">Chưa có mô tả ngắn trên menu.</div>';
    }

    var html = '';

      html += '<button type="button" class="pd-meta-reveal-btn" id="pd-meta-reveal-btn">Xem thêm</button>' +
        '<div class="pd-meta-extra-wrap" id="product-detail-meta-extra" style="display:none">' + extraParts.join('') + '</div>';

  // ====== PRODUCT MODAL ======
  function familyUnitPrice500ml(p) {
    if (!p) return 0;
    var sell = parseFloat(p.familySell500) || 0;
    if (sell > 0) return sell;
    var ex = parseFloat(p.familyPackExtra500) || 0;
    if (ex <= 0) return 0;
    return (parseFloat(p.basePrice) || 0) + ex;
  }
  function familyUnitPrice1L(p) {
    if (!p) return 0;
    var sell = parseFloat(p.familySell1L) || 0;
    if (sell > 0) return sell;
    var ex = parseFloat(p.familyPackExtra1L) || 0;
    if (ex <= 0) return 0;
    return (parseFloat(p.basePrice) || 0) + ex;
  }
  function hasFamilyPackOptions(p) {
    return familyUnitPrice500ml(p) > 0 || familyUnitPrice1L(p) > 0;
  }
  function buildCupSizePartsOnly(p) {
    var smallDisc = Math.max(0, parseFloat(p.smallCupDiscount) || 0);
    var large = parseFloat(p.largeCupExtra);
    if (isNaN(large)) large = 8000;
    if (p.largeCupExtra === '' || p.largeCupExtra === null) large = 8000;
    var enS = p.enableSmall !== false;
    var enR = p.enableRegular !== false;
    var enL = p.enableLarge !== false;
    var parts = [];
    if (enL) parts.push({ label: 'Lớn', sub: '', val: 'Lớn (450ml)', price: large, icon: '🧃' });
    if (enR) parts.push({ label: 'Vừa', sub: '', val: 'Vừa (350ml)', price: 0, icon: '🥤' });
    if (enS) parts.push({ label: 'Nhỏ', sub: '', val: 'Nhỏ (250ml)', price: -smallDisc, icon: '🥛' });
    if (parts.length === 0) parts.push({ label: 'Vừa', sub: '', val: 'Vừa (350ml)', price: 0, icon: '🥤' });
    return parts;
  }
  function buildFamilySizePartsOnly(p) {
    var parts = [];
    var u500 = familyUnitPrice500ml(p);
    var u1 = familyUnitPrice1L(p);
    var bp = parseFloat(p.basePrice) || 0;
    if (u500 > 0) parts.push({ label: 'Chai 500ml', sub: fmt(u500), val: 'Chai gia đình 500ml', price: Math.round(u500 - bp), icon: '🧴' });
    if (u1 > 0) parts.push({ label: 'Chai 1 lít', sub: fmt(u1), val: 'Chai gia đình 1 lít', price: Math.round(u1 - bp), icon: '🧴' });
    return parts;
  }
  function paintSizeButtons(parts, defIdx) {
    var sizeOptions = document.getElementById('sheet-size-options');
    if (!sizeOptions || !parts.length) return;
    var bp = currentProduct ? (parseFloat(currentProduct.basePrice) || 0) : 0;
    var szHtml = '';
    for (var j = 0; j < parts.length; j++) {
      var q = parts[j];
      var act = j === defIdx ? ' active' : '';
      var showPrice = fmt(Math.max(0, bp + q.price));
      szHtml += '<div class="size-btn' + act + '" onclick="selectSizeBtn(this,\'' + escAttr(q.val) + '\',' + q.price + ')">' +
        '<span class="sz-name">' + esc(q.label) + '</span>' +
        '<span class="sz-price">' + esc(showPrice) + '</span></div>';
    }
    sizeOptions.innerHTML = szHtml;
    currentOptions.size = parts[defIdx].val;
    currentOptions.sizePrice = parts[defIdx].price;
  }
  function renderProductSizeGrid() {
    var p = currentProduct;
    if (!p) return;
    var isTopping = (p.category || '').toLowerCase().indexOf('topping') !== -1;
    if (isTopping) return;
    var parts = currentOptions.familyPack ? buildFamilySizePartsOnly(p) : buildCupSizePartsOnly(p);
    if (currentOptions.familyPack && parts.length === 0) {
      currentOptions.familyPack = false;
      var cb = document.getElementById('family-pack-toggle');
      if (cb) cb.checked = false;
      parts = buildCupSizePartsOnly(p);
    }
    var defIdx = 0;
    var want = currentOptions.familyPack ? 'Chai gia đình 500ml' : 'Vừa (350ml)';
    for (var pi = 0; pi < parts.length; pi++) {
      if (parts[pi].val === want) { defIdx = pi; break; }
    }
    paintSizeButtons(parts, defIdx);
  }

  function renderProductToppings(p) {
    var grp = document.getElementById('sheet-topping-group');
    var grid = document.getElementById('sheet-topping-options');
    if (!grp || !grid) return;
    var tops = productToppings(p);
    if (!tops.length) { grp.style.display = 'none'; grid.innerHTML = ''; return; }
    grp.style.display = '';
    grid.innerHTML = tops.map(function (t) {
      var priceTxt = t.price > 0 ? ('+' + fmt(t.price)) : (t.noTopping ? 'Không thêm' : '');
      var oc = t.noTopping
        ? ' onclick="selectNoTopping(this)"'
        : (' onclick="selectOption(this,\'addon\',\'' + escAttr(t.name) + '\',' + (parseFloat(t.price) || 0) + ')"');

        '<div class="nut-chip-name">' + esc(t.name) + '</div>' +

  function renderNutMixOptions(p, isTopping) {
    var nutGrp = document.getElementById('pos-nut-opt-group');

          '<div class="nut-chip-price">' + esc(priceTxt) + '</div>' +
        '</div>' +

  function refreshNutMixIfOpen() {
    try {
      var m = document.getElementById('productModal');
      if (!m || !m.classList.contains('open')) return;
      if (!currentProduct) return;
      var isTopping = (currentProduct.category || '').toLowerCase().indexOf('topping') !== -1;
      renderNutMixOptions(currentProduct, isTopping);

  }
  function toggleFamilyPackMode() {
    var cb = document.getElementById('family-pack-toggle');

    currentQty = 1;
    currentOptions = {
      size: 'Vừa (350ml)', sizePrice: 0, ice: 'Không đá', sweetness: 'Ngọt vừa', addons: [], addonPrices: [],

      var famCb = document.getElementById('family-pack-toggle');
      if (famRow && famCb) {
        if (hasFamilyPackOptions(p)) {
          famRow.style.display = 'block';
          famCb.checked = false;
          currentOptions.familyPack = false;
        } else {
          famRow.style.display = 'none';
          famCb.checked = false;
          currentOptions.familyPack = false;
        }
      }
      renderProductSizeGrid();

      if (iceG) {
        document.querySelectorAll('#sheet-ice-options .opt-btn, #sheet-ice-group .opt-btn').forEach(function (b) { b.classList.remove('active'); });
        var iceMid = document.querySelector('#sheet-ice-options .opt-btn[onclick*="Vừa"], #sheet-ice-group .opt-btn[onclick*="Vừa"]');
        if (iceMid) iceMid.classList.add('active');
      }
      currentOptions.ice = 'Vừa';
      currentOptions.serveTemp = 'iced';
      currentOptions.packaging = 'paper';

    if (sweetDefault) sweetDefault.classList.add('active');

    renderNutMixOptions(p, isTopping);

    renderProductDetailMeta(p);

  function selectServeTemp(el, mode) {
    document.querySelectorAll('#sheet-temp-options .opt-btn').forEach(function (b) { b.classList.remove('active'); });
    el.classList.add('active');
    currentOptions.serveTemp = mode;
    var iceG = document.getElementById('sheet-ice-group');
    if (iceG) {
      if (mode === 'iced') {
        iceG.style.display = '';
        document.querySelectorAll('#sheet-ice-group .opt-btn').forEach(function (b) { b.classList.remove('active'); });
        var mid = document.querySelector('#sheet-ice-group .opt-btn[onclick*="Vừa"]');
        if (mid) { mid.classList.add('active'); currentOptions.ice = 'Vừa'; }
      } else {
        iceG.style.display = 'none';
        currentOptions.ice = 'Không đá';
      }
    }
    updateModalPrice();
  }

  function selectPackaging(el, pack) {
    document.querySelectorAll('#sheet-pack-options .opt-btn').forEach(function (b) { b.classList.remove('active'); });
    el.classList.add('active');
    currentOptions.packaging = pack;
    var ex = pack === 'plastic' && currentProduct ? (parseFloat(currentProduct.plasticBottleExtra) || 0) : 0;
    currentOptions.packagingPrice = ex;
    updateModalPrice();
  }

  function closeProductModal(e) {
    if (!e || e.target.id === 'productModal') {
      document.getElementById('productModal').classList.remove('open');
      document.body.style.overflow = '';
    }
  }

  function selectOption(el, group, value, price) {
    if (price === undefined || price === null) price = 0;
    if (group === 'ice' || group === 'sweetness') {
      el.parentNode.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      currentOptions[group] = value;
    } else if (group === 'addon') {
      const idx = currentOptions.addons.indexOf(value);
      if (idx > -1) {
        currentOptions.addons.splice(idx, 1);
        currentOptions.addonPrices.splice(idx, 1);
        el.classList.remove('active');
      } else {
        currentOptions.addons.push(value);
        currentOptions.addonPrices.push(price);
        el.classList.add('active');
      }
    }
    updateModalPrice();
  }

  function selectSizeBtn(el, value, price) {
    document.querySelectorAll('#sheet-size-options .size-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    currentOptions.size = value;
    currentOptions.sizePrice = price;
    if (String(value || '').indexOf('Chai gia đình') === 0) currentOptions.familyPack = true;
    else currentOptions.familyPack = false;
    updateModalPrice();
  }

  function toggleSubOptions(el, id) {
    el.classList.toggle('active');
    document.getElementById(id + '-sub-options').classList.toggle('show');
  }

  function changeQty(delta) {
    currentQty = Math.max(1, currentQty + delta);
    document.getElementById('qty-display').textContent = currentQty;
    updateModalPrice();
  }

  function updateModalPrice() {
    if (!currentProduct) return;
    const addonTotal = currentOptions.addonPrices.reduce((s, p) => s + p, 0);
    var pack = currentOptions.packagingPrice || 0;
    const unitPrice = currentProduct.basePrice + currentOptions.sizePrice + addonTotal + pack;
    const total = unitPrice * currentQty;
    document.getElementById('sheet-price').textContent = fmt(unitPrice);
    document.getElementById('sheet-add-total').textContent = fmt(total);
  }

  function buildCartOptsParts(item) {
    var o = item.options || {};
    if (normalizeCupSizeLabel(o.size) === 'Tiêu chuẩn') {
      var tOnly = [];
      if (o.sweetness) tOnly.push(o.sweetness);
      return tOnly.concat(o.addons || []).filter(Boolean);
    }
    var parts = [];
    parts.push(o.size);
    var st = o.serveTemp || 'cold_steep';
    if (st === 'iced' && o.ice) parts.push('Đá: ' + o.ice);
    else parts.push(serveTempLabel(st));
    if (o.sweetness) parts.push(o.sweetness);
    if (o.packaging === 'plastic') parts.push('Chai nhựa');
    else if (o.packaging === 'paper') parts.push('Ly giấy');
    parts = parts.concat(o.addons || []).filter(Boolean);
    return parts;
  }

  function lineItemUnitTotal(item) {
    var addonTotal = item.options.addonPrices.reduce(function (a, p) { return a + p; }, 0);
    return item.basePrice + item.options.sizePrice + addonTotal + (item.options.packagingPrice || 0);
  }

  function addToCart() {
    if (!currentProduct) return;
    const addonTotal = currentOptions.addonPrices.reduce((s, p) => s + p, 0);
    const baseItemPrice = currentProduct.basePrice + currentOptions.sizePrice + addonTotal;
    var mn = document.getElementById('modal-note');
    var note = (mn && mn.value) ? mn.value.trim() : '';

    const existing = cart.find(i =>
      i.id === currentProduct.id &&
      !!i.options.familyPack === !!currentOptions.familyPack &&
      i.options.ice === currentOptions.ice &&
      i.options.sweetness === currentOptions.sweetness &&
      (i.options.serveTemp || 'cold_steep') === (currentOptions.serveTemp || 'cold_steep') &&
      (i.options.packaging || 'paper') === (currentOptions.packaging || 'paper') &&
      normalizeCupSizeLabel(i.options.size) === normalizeCupSizeLabel(currentOptions.size) &&
      JSON.stringify(i.options.addons) === JSON.stringify(currentOptions.addons) &&
      i.note === note
    );
    if (existing) { existing.quantity += currentQty; }
    else {
      cart.push({
        id: currentProduct.id,
        name: currentProduct.name,
        emoji: getEmoji(currentProduct),
        imageUrl: currentProduct.imageUrl || '',
        basePrice: currentProduct.basePrice,
        options: Object.assign({}, currentOptions, {
          addons: currentOptions.addons.slice(),
          addonPrices: currentOptions.addonPrices.slice(),
          packagingPrice: currentOptions.packagingPrice || 0
        }),
        note,
        quantity: currentQty
      });
    }
    updateCartUI();
    closeProductModal();
    showToast('✅ Đã thêm ' + currentProduct.name + '!');
  }

  function quickAdd(p) {
    const isTop = (p.category || '').toLowerCase().indexOf('topping') !== -1;
    const defSize = isTop ? 'Tiêu chuẩn' : 'Vừa (350ml)';
    const existing = cart.find(function (i) {
      return i.id === p.id && !i.note && normalizeCupSizeLabel(i.options.size) === defSize &&
        (i.options.serveTemp || 'cold_steep') === 'cold_steep' && (i.options.packaging || 'paper') === 'paper';
    });
    if (existing) { existing.quantity++; }
    else {
      cart.push({
        id: p.id, name: p.name, emoji: getEmoji(p),
        imageUrl: p.imageUrl || '',
        basePrice: p.basePrice,
        options: {
          size: defSize, sizePrice: 0, ice: 'Không đá', sweetness: 'Ngọt vừa', addons: [], addonPrices: [],
          serveTemp: 'cold_steep', packaging: 'paper', packagingPrice: 0
        },
        note: '', quantity: 1
      });
    }
    updateCartUI();
    showToast('✅ ' + p.name + ' +1');
  }

  // ====== CART UI ======
  function updateCartUI() {
    const totalQty = cart.reduce((s, i) => s + i.quantity, 0);
    const subtotal = cart.reduce((s, i) => {
      return s + lineItemUnitTotal(i) * i.quantity;
    }, 0);
    currentFinalAmount = subtotal - promoDiscount - pointsDiscount;

    // Cart badge
    const mobileBadge = document.getElementById('mobile-cart-badge');
    const countBadge = document.getElementById('cart-count-badge');
    if (totalQty > 0) {
      mobileBadge.textContent = totalQty;
      mobileBadge.style.display = 'flex';
      mobileBadge.classList.add('pulse');
      setTimeout(() => mobileBadge.classList.remove('pulse'), 400);
      countBadge.textContent = totalQty;
      countBadge.style.display = '';
    } else {
      mobileBadge.style.display = 'none';
      countBadge.style.display = 'none';
    }

    // Items — không dùng appendChild(empty-order): sau khi innerHTML có món, node #empty-order bị xóa khỏi DOM → getElementById trả null → lỗi appendChild.
    const container = document.getElementById('order-items');
    if (cart.length === 0) {
      container.innerHTML =
        '<div class="empty-order" id="empty-order">' +
        '<div class="empty-icon-wrap">☕</div>' +
        '<p>Chưa có món nào</p>' +
        '<span>Chọn sản phẩm từ<br>menu bên trái nhé!</span>' +
        '</div>';
    } else {
      container.innerHTML = cart.map((item, i) => {
        const unitPrice = lineItemUnitTotal(item);
        const totalPrice = unitPrice * item.quantity;
        const opts = buildCartOptsParts(item);
        const imgEl = item.imageUrl
          ? '<img src="' + esc(item.imageUrl) + '" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">'
          : item.emoji;
        const notePart = item.note ? ' · 📝 ' + esc(item.note) : '';
        return '<div class="order-item">' +
        '<div class="oi-emoji">' + imgEl + '</div>' +
        '<div class="oi-info">' +
          '<div class="oi-name">' + esc(item.name) + '</div>' +
          '<div class="oi-opts">' + opts.join(' · ') + notePart + '</div>' +
          '<div class="oi-bottom">' +
            '<div class="oi-price">' + fmt(totalPrice) + '</div>' +
            '<div class="qty-ctrl">' +
              '<button class="qty-btn" onclick="updateQty(' + i + ',-1)"><i class="fa-solid fa-minus"></i></button>' +
              '<span class="qty-val">' + item.quantity + '</span>' +
              '<button class="qty-btn" onclick="updateQty(' + i + ',1)"><i class="fa-solid fa-plus"></i></button>' +
            '</div>' +
            '<button class="oi-del" onclick="removeItem(' + i + ')"><i class="fa-solid fa-trash"></i></button>' +
          '</div>' +
        '</div>' +
      '</div>';
      }).join('');
    }

    // Summary
    document.getElementById('sum-subtotal').textContent = fmt(subtotal);
    document.getElementById('sum-promo-row').style.display = promoDiscount > 0 ? '' : 'none';
    document.getElementById('sum-promo').textContent = '-' + fmt(promoDiscount);
    document.getElementById('sum-points-row').style.display = pointsDiscount > 0 ? '' : 'none';
    document.getElementById('sum-points').textContent = '-' + fmt(pointsDiscount);
    document.getElementById('sum-total').textContent = fmt(Math.max(0, currentFinalAmount));

    const btn = document.getElementById('checkout-btn');
    btn.disabled = cart.length === 0;

    // Live order ID
    if (!document.getElementById('live-order-id').textContent.startsWith('#ORD')) {
      document.getElementById('live-order-id').textContent = '#ORD-' + (++orderCounter);
    }

    var phDigits = String(document.getElementById('customer-phone').value || '').replace(/\D/g, '');
    if (phDigits.length === 10) {
      clearTimeout(window._sunPromoDeb);
      window._sunPromoDeb = setTimeout(function () { refreshPromoSuggestionsSilent(); }, 80);
    }
    clearTimeout(window._sunCheckoutPromoDeb);
    window._sunCheckoutPromoDeb = setTimeout(function () { refreshCheckoutPromoOptions(); }, 80);
  }

  function renderCheckoutPromoPick(payload) {
    var sec = document.getElementById('promo-pick-section');
    var list = document.getElementById('promo-pick-list');
    if (!sec || !list) return;
    var opts = (payload && payload.options) ? payload.options : [];
    if (!opts.length) {
      sec.style.display = 'none';
      list.innerHTML = '';
      return;
    }
    sec.style.display = '';
    var cur = String(document.getElementById('promo-input').value || '').trim().toUpperCase();
    list.innerHTML = opts.map(function (o, idx) {
      if (o.kind === 'info') {
        return '<div class="promo-pick-info"><i class="fa-solid fa-circle-info" style="color:var(--blue);"></i> ' + esc(o.title || '') + (o.subtitle ? ' — ' + esc(o.subtitle) : '') + '</div>';
      }
      var id = 'ppick-' + idx;
      var checked = cur === String(o.code || '').toUpperCase() ? ' checked' : '';
      return '<label class="promo-pick-row" for="' + id + '">' +
        '<input type="checkbox" id="' + id + '" data-code="' + escAttr(o.code) + '"' + checked + ' onchange="onCheckoutPromoPick(this)">' +
        '<div class="pp-meta"><strong>' + esc(o.code) + '</strong> — ' + esc(o.title || '') +
        (o.subtitle ? '<div style="font-size:11px;color:var(--text-3);margin-top:4px;">' + esc(o.subtitle) + '</div>' : '') + '</div>' +
        '<span class="pp-disc">-' + fmt(o.discount || 0) + '</span></label>';
    }).join('');
  }

  async function refreshCheckoutPromoOptions() {
    var sec = document.getElementById('promo-pick-section');
    if (!sec) return;
    if (!cart.length) {
      sec.style.display = 'none';
      return;
    }
    var ph = String(document.getElementById('customer-phone').value || '').replace(/\D/g, '');
    try {
      var r = await api.call('getCheckoutPromoOptions', ph, cartSummaryForPromo(), cartSubtotalRaw());
      renderCheckoutPromoPick(r || {});
    } catch (e) {
      sec.style.display = 'none';
    }
  }

  function onCheckoutPromoPick(el) {
    if (!el || !el.dataset.code) return;
    var code = el.dataset.code;
    var list = document.getElementById('promo-pick-list');
    if (list && el.checked) {
      list.querySelectorAll('input[type=checkbox]').forEach(function (c) {
        if (c !== el) c.checked = false;
      });
      document.getElementById('promo-input').value = code;
      applyPromo({ fromPick: true });
    } else {
      document.getElementById('promo-input').value = '';
      promoDiscount = 0;
      var msg = document.getElementById('promo-msg');
      if (msg) { msg.textContent = ''; msg.className = 'promo-msg'; }
      updateCartUI();
    }
  }

  function updateQty(i, delta) {
    cart[i].quantity = Math.max(1, cart[i].quantity + delta);
    updateCartUI();
  }

  function removeItem(i) {
    cart.splice(i, 1);
    if (cart.length === 0) { promoDiscount = 0; pointsDiscount = 0; document.getElementById('promo-msg').textContent = ''; document.getElementById('promo-input').value = ''; }
    updateCartUI();
  }

  // ====== CUSTOMER + GỢI Ý KM (theo SĐT) ======
  function cartSummaryForPromo() {
    return JSON.stringify(cart.map(function (i) {
      return { id: i.id, quantity: i.quantity };
    }));
  }

  function cartSubtotalRaw() {
    return cart.reduce(function (s, i) {
      return s + lineItemUnitTotal(i) * i.quantity;
    }, 0);
  }

  function renderPromoSuggestions(sug) {
    var strip = document.getElementById('voucher-strip');
    var list = document.getElementById('voucher-chips-list');
    if (!strip || !list) return;
    var suggestions = (sug && sug.suggestions) ? sug.suggestions : [];
    if (!suggestions.length) {
      strip.style.display = 'none';
      list.innerHTML = '';
      return;
    }
    strip.style.display = '';
    list.innerHTML = suggestions.map(function (s) {
      if (s.type === 'info') {
        return '<div class="v-chip v-chip-info" title="' + escAttr(s.reason || '') + '">' + esc(s.name || s.reason) + '</div>';
      }
      return '<div class="v-chip" title="' + escAttr(s.reason || '') + '" onclick="applySuggestedPromo(\'' + escAttr(s.code) + '\')">' + esc(s.code) + '</div>';
    }).join('');
  }

  async function applySuggestedPromo(code) {
    document.getElementById('promo-input').value = String(code || '').trim().toUpperCase();
    await applyPromo();
  }

  async function refreshPromoSuggestionsSilent() {
    var ph = normalizeVnPhoneDigitsClient(document.getElementById('customer-phone').value);
    if (ph.length !== 10) return;
    try {
      var nm = document.getElementById('customer-name').value.trim() || '';
      var sug = await api.call('getSuggestedPromosWithContext', ph, nm, cartSummaryForPromo(), cartSubtotalRaw(), false);
      renderPromoSuggestions(sug);
    } catch (e) { /* ignore */ }
  }

  function isMemberCodeInput(val) {
    return /^SUN[A-Z0-9]{6,}$/i.test(String(val || '').trim());
  }

  async function handlePhoneInput(val) {
    var raw = String(val || '').trim();
    if (isMemberCodeInput(raw)) {
      var seqCode = ++__sunPhoneLookupSeq;
      try {
        var insCode = await api.call('getPosCustomerBasic', raw.toUpperCase());
        if (seqCode !== __sunPhoneLookupSeq) return;
        if (insCode && insCode.ok) {
          document.getElementById('customer-phone').value = insCode.phoneDigits || raw;
          currentCustomer = {
            phone: insCode.phoneDigits,
            name: insCode.name || '',
            points: insCode.points,
            tier: insCode.tier,
            memberCode: insCode.memberCode || raw.toUpperCase(),
            visitCount: insCode.visitCount || 0,
            vouchers: []
          };
          if (insCode.name) document.getElementById('customer-name').value = insCode.name;
          applyCustomerInsightToUI(insCode);
          showToast('✅ Đã nhận mã HV ' + (insCode.memberCode || raw.toUpperCase()));
          updateCartUI();
        } else {
          showToast('⚠️ Không tìm thấy mã HV');
        }
      } catch (eCode) {
        if (seqCode === __sunPhoneLookupSeq) showToast('⚠️ Lỗi tra mã HV');
      }
      return;
    }
    var digits = normalizeVnPhoneDigitsClient(val);
    if (digits.length === 10) {
      var seq = ++__sunPhoneLookupSeq;
      try {
        var nm = document.getElementById('customer-name').value.trim() || '';
        await api.call('ensureCustomerForPos', digits, nm);
        if (seq !== __sunPhoneLookupSeq) return;
        var nmAfter = document.getElementById('customer-name').value.trim() || '';
        var cartSum = cartSummaryForPromo();
        var subRaw = cartSubtotalRaw();
        var insSug = await Promise.all([
          api.call('getPosCustomerBasic', digits),
          api.call('getSuggestedPromosWithContext', digits, nmAfter, cartSum, subRaw, true)
        ]);
        if (seq !== __sunPhoneLookupSeq) return;
        var ins = insSug[0];
        var sug = insSug[1];
        if (ins && ins.ok) {
          currentCustomer = {
            phone: ins.phoneDigits,
            name: ins.name || nmAfter,
            points: ins.points,
            tier: ins.tier,
            visitCount: ins.visitCount || 0,
            vouchers: []
          };
          if (ins.name && !nmAfter) document.getElementById('customer-name').value = ins.name;
          applyCustomerInsightToUI(ins);
        }
        api.call('getCustomers').then(function (allC) { customersData = allC || []; }).catch(function () { });
        renderPromoSuggestions(sug);
        if (sug && sug.autoApplyCode) {
          document.getElementById('promo-input').value = String(sug.autoApplyCode).trim().toUpperCase();
          await applyPromo();
        }
        void refreshCheckoutPromoOptions();
        updateCartUI();
      } catch (e) {
        if (seq === __sunPhoneLookupSeq) showToast('⚠️ Không tải được khách / KM');
      }
    } else {
      __sunPhoneLookupSeq++;
      if (currentCustomer) {
        currentCustomer = null;
        document.getElementById('customer-info-bar').classList.remove('show');
        var ex = document.getElementById('cust-insight-extras');
        if (ex) { ex.innerHTML = ''; ex.classList.remove('show'); }
        pointsDiscount = 0;
      }
      if (digits.length < 10) {
        document.getElementById('voucher-strip').style.display = 'none';
        var vl = document.getElementById('voucher-chips-list');
        if (vl) vl.innerHTML = '';
      }
      updateCartUI();
    }
  }

  async function handleCustomerNameBlur() {
    var ph = normalizeVnPhoneDigitsClient(document.getElementById('customer-phone').value);
    if (ph.length !== 10) return;
    try {
      await api.call('ensureCustomerForPos', ph, document.getElementById('customer-name').value.trim() || '');
      var ins = await api.call('getPosCustomerBasic', ph);
      if (ins && ins.ok) applyCustomerInsightToUI(ins);
      await refreshPromoSuggestionsSilent();
    } catch (eN) { }
  }

  function applyVoucher(el, code, discount) {
    document.querySelectorAll('.v-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    pointsDiscount = discount;
    document.getElementById('promo-input').value = code;
    updateCartUI();
    showToast('✅ Đã áp dụng voucher!');
  }

  // ====== PROMO ======
  async function applyPromo(opts) {
    opts = opts || {};
    const code = document.getElementById('promo-input').value.trim().toUpperCase();
    const msg = document.getElementById('promo-msg');
    if (!code) {
      if (!opts.fromPick) {
        msg.textContent = '⚠️ Nhập mã khuyến mãi!';
        msg.className = 'promo-msg err';
      }
      return;
    }
    const subtotal = cart.reduce((s, i) => { return s + lineItemUnitTotal(i) * i.quantity; }, 0);
    const phone = normalizeVnPhoneDigitsClient(document.getElementById('customer-phone').value);
    try {
      const result = await api.call('applyPromoCode', code, subtotal, phone, cartSummaryForPromo());
      if (result && result.ok && result.discount >= 0) {
        promoDiscount = result.discount;
        msg.textContent = result.discount > 0 ? ('✅ Tiết kiệm ' + fmt(promoDiscount) + '!') : ('✅ ' + (result.message || 'Đã áp mã'));
        msg.className = 'promo-msg ok';
      } else {
        promoDiscount = 0;
        msg.textContent = (result && result.message) ? ('❌ ' + result.message) : '❌ Mã không hợp lệ hoặc hết hạn!';
        msg.className = 'promo-msg err';
      }
    } catch (e) {
      promoDiscount = 0;
      msg.textContent = '❌ Mã không hợp lệ!';
      msg.className = 'promo-msg err';
    }
    updateCartUI();
    refreshCheckoutPromoOptions();
  }

  // ====== CHECKOUT ======
  function proceedCheckout() {
    if (cart.length === 0) return;
    document.getElementById('receipt-time').textContent = new Date().toLocaleString('vi-VN');
    document.getElementById('r-order-id').textContent = document.getElementById('live-order-id').textContent;
    const name = document.getElementById('customer-name').value.trim() || 'Khách lẻ';
    const phone = document.getElementById('customer-phone').value.trim() || '--';
    document.getElementById('r-customer').textContent = name;
    document.getElementById('r-phone').textContent = phone;
    document.getElementById('r-items').innerHTML = cart.map(function (i) {
      var p = lineItemUnitTotal(i) * i.quantity;
      var sub = buildCartOptsParts(i).join(', ');
      var note = (i.note && String(i.note).trim()) ? (' · Ghi chú: ' + String(i.note).trim()) : '';
      return '<div class="r-row item-row"><span>' + i.quantity + '× ' + esc(i.name) + (sub ? ' — ' + esc(sub) : '') + esc(note) + '</span><strong>' + fmt(p) + '</strong></div>';
    }).join('');
    var subtotal = cart.reduce(function (s, i) { return s + lineItemUnitTotal(i) * i.quantity; }, 0);
    var pr = document.getElementById('r-pricing-block');
    var disc = promoDiscount + pointsDiscount;
    if (pr) {
      pr.style.display = (disc > 0 || subtotal !== currentFinalAmount) ? '' : 'none';
      var rs = document.getElementById('r-subtotal');
      if (rs) rs.textContent = fmt(subtotal);
      var rd = document.getElementById('r-discount-line');
      var rdv = document.getElementById('r-discount');
      if (disc > 0 && rd && rdv) {
        rd.style.display = '';
        rdv.textContent = '-' + fmt(disc);
      } else if (rd) rd.style.display = 'none';
      var pc = document.getElementById('promo-input') && document.getElementById('promo-input').value.trim();
      var rpl = document.getElementById('r-promo-line');
      var rpc = document.getElementById('r-promo-code');
      if (pc && rpl && rpc) {
        rpl.style.display = '';
        rpc.textContent = pc.toUpperCase();
      } else if (rpl) rpl.style.display = 'none';
    }
    document.getElementById('r-total').textContent = fmt(currentFinalAmount);
    var rprint = document.getElementById('receipt-print-btn');
    if (rprint) rprint.style.display = 'none';

    selectedPayment = 'cash';
    document.querySelectorAll('.pay-opt').forEach(p => p.classList.remove('selected'));
    document.querySelector('.pay-opt[onclick*="cash"]').classList.add('selected');
    document.getElementById('cash-section').classList.add('show');
    document.getElementById('receipt-payment-block').style.display = '';
    const btn = document.getElementById('complete-btn');
    btn.classList.add('receipt-act-btn');
    btn.innerHTML = '<span class="receipt-act-ic"><i class="fa-solid fa-money-bill-wave"></i></span><span class="receipt-act-txt">Thanh toán</span>';
    btn.onclick = function () { completeOrder(false); };
    var cprint = document.getElementById('complete-print-btn');
    if (cprint) {
      cprint.classList.add('receipt-act-btn');
      cprint.style.display = '';
      cprint.innerHTML = '<span class="receipt-act-ic"><i class="fa-solid fa-print"></i></span><span class="receipt-act-txt">In + Thanh toán</span>';
      cprint.onclick = function () { completeOrder(true); };
    }
    sunModalRaise('receiptModal');
    document.getElementById('receiptModal').classList.add('open');
  }

  function closeReceiptModal() { document.getElementById('receiptModal').classList.remove('open'); }

  function selectPayment(e, method) {
    selectedPayment = method;
    document.querySelectorAll('.pay-opt').forEach(p => p.classList.remove('selected'));
    e.target.closest('.pay-opt').classList.add('selected');
    document.getElementById('cash-section').classList.toggle('show', method === 'cash');
  }

  function setCashGiven(amt) { document.getElementById('cash-given').value = amt; calculateChange(); }
  function calculateChange() {
    const given = parseInt(document.getElementById('cash-given').value) || 0;
    document.getElementById('change-display').textContent = fmt(Math.max(0, given - currentFinalAmount));
  }

  // ====== COMPLETE ORDER ======
  async function completeOrder(doPrintAfter) {
    if (doPrintAfter === undefined) doPrintAfter = false;
    printInvoiceWhenPaid = !!doPrintAfter;
    var phoneRaw = document.getElementById('customer-phone').value;
    const phone = normalizeVnPhoneDigitsClient(phoneRaw) || String(phoneRaw || '').trim();
    var cn = document.getElementById('customer-name');
    const name = (cn && cn.value && cn.value.trim()) ? cn.value.trim() : 'Khách lẻ';

    currentOrderData = {
      customerName: name, customerPhone: phone,
      items: cart.map(item => ({
        id: item.id, name: item.name,
        options: item.options,
        quantity: item.quantity,
        totalPrice: lineItemUnitTotal(item) * item.quantity,
        note: item.note || '',
        excludeFromLoyaltyPoints: (lineItemUnitTotal(item) * item.quantity) <= 0.5,
        extraNuts: (item.options && item.options.addons) ? item.options.addons.slice() : [],
        ingredients: (function () {
          var found = menuData.find(function (m) { return m.id === item.id; });
          return (found && found.ingredients) ? found.ingredients : [];
        })()
      })),
      totalAmount: cart.reduce((s, i) => { return s + lineItemUnitTotal(i) * i.quantity; }, 0),
      discount: promoDiscount + pointsDiscount,
      finalAmount: currentFinalAmount,
      paymentMethod: selectedPayment === 'cash' ? 'Tiền mặt' : 'Chuyển khoản',
      promoCode: document.getElementById('promo-input').value.trim().toUpperCase()
    };

    try {
      showLoading(true);
      let r = null;
      r = await api.call('saveOrder', currentOrderData);
      if (!r || !r.orderId) throw new Error('Không nhận được mã đơn từ server');
      currentOrderId = r.orderId;
      var receiptSnap = null;
      try {
        receiptSnap = JSON.parse(JSON.stringify(currentOrderData));
      } catch (eSnap) {
        receiptSnap = currentOrderData;
      }
      closeReceiptModal();
      if (r.status === 'Chờ thanh toán') {
        lastPaymentWasTransfer = true;
        document.getElementById('qr-partial-payment').style.display = 'none';
        showQrOverlay();
        armQrActionsUnlock();
        document.getElementById('qr-amount-display').textContent = fmt(currentOrderData.finalAmount);
        updateQR(currentOrderData.finalAmount, currentOrderId);
        startPolling();
      } else {
        lastPaymentWasTransfer = false;
        try {
          playPaySuccessSound();
          showFinalReceipt(currentOrderId, receiptSnap, !!doPrintAfter);
          printInvoiceWhenPaid = false;
        } catch (uiErr) {
          showToast('❌ Lỗi hiển thị hóa đơn: ' + (uiErr && uiErr.message ? uiErr.message : uiErr));
        }
        resetState();
      }
    } catch (e) {
      printInvoiceWhenPaid = false;
      var em = e && e.message ? e.message : (typeof e === 'string' ? e : 'Lỗi không xác định');
      showToast('❌ Lỗi lưu đơn: ' + em);
    }
    finally { showLoading(false); }
  }

  function sunConfirm(opts) {
    opts = opts || {};
    return new Promise(function (resolve) {
      var ov = document.getElementById('sunConfirmOverlay');
      if (!ov) { resolve(window.confirm(opts.message || '')); return; }
      var tEl = document.getElementById('sun-dlg-title');
      var mEl = document.getElementById('sun-dlg-msg');
      var okBtn = document.getElementById('sun-dlg-ok');
      var cancelBtn = document.getElementById('sun-dlg-cancel');
      if (tEl) tEl.textContent = opts.title || 'Xác nhận';
      if (mEl) mEl.textContent = opts.message || '';
      function cleanup() {
        ov.classList.remove('show');
        ov.setAttribute('aria-hidden', 'true');
        okBtn.onclick = cancelBtn.onclick = null;
      }
      okBtn.onclick = function () { cleanup(); resolve(true); };
      cancelBtn.onclick = function () { cleanup(); resolve(false); };
      ov.setAttribute('aria-hidden', 'false');
      ov.classList.add('show');
    });
  }

  function resetState() {
    lastPaymentWasTransfer = false;
    printInvoiceWhenPaid = false;
    cart = []; promoDiscount = 0; pointsDiscount = 0; currentCustomer = null; currentOrderId = null; currentOrderData = null;
    document.getElementById('customer-phone').value = '';
    document.getElementById('customer-name').value = '';
    document.getElementById('customer-info-bar').classList.remove('show');
    var ex2 = document.getElementById('cust-insight-extras');
    if (ex2) { ex2.innerHTML = ''; ex2.classList.remove('show'); }
    document.getElementById('voucher-strip').style.display = 'none';
    document.getElementById('promo-msg').textContent = '';
    document.getElementById('promo-input').value = '';
    document.getElementById('live-order-id').textContent = '#NEW';
    selectedPayment = 'cash';
    updateCartUI();
    // Display đã được gỡ bỏ theo yêu cầu
  }

  // ====== QR PAYMENT ======
  let pollingInterval;
  var bankPollInFlight = false;
  var bankPollFailCount = 0;
  var qrActionUnlockTimer = null;
  function showQrOverlay() { document.getElementById('qrOverlay').classList.add('show'); }
  function closeQrOverlay() {
    document.getElementById('qrOverlay').classList.remove('show');
    document.getElementById('qr-partial-payment').style.display = 'none';
    stopPolling();
    lockQrActions(true);
  }
  function lockQrActions(resetText) {
    if (qrActionUnlockTimer) { clearTimeout(qrActionUnlockTimer); qrActionUnlockTimer = null; }
    var bCancel = document.getElementById('qr-cancel-btn');
    var bConfirm = document.getElementById('qr-confirm-btn');
    var hint = document.getElementById('qr-actions-hint');
    if (bCancel) bCancel.disabled = true;
    if (bConfirm) bConfirm.disabled = true;
    if (hint && resetText) hint.textContent = 'Chờ 15 giây để bật thao tác…';
  }
  function armQrActionsUnlock() {
    lockQrActions(true);
    qrActionUnlockTimer = setTimeout(function () {
      var bCancel = document.getElementById('qr-cancel-btn');
      var bConfirm = document.getElementById('qr-confirm-btn');
      var hint = document.getElementById('qr-actions-hint');
      if (bCancel) bCancel.disabled = false;
      if (bConfirm) bConfirm.disabled = false;
      if (hint) hint.textContent = 'Bạn có thể Hủy hoặc Xác nhận giao dịch.';
    }, 15000);
  }
  function updateQR(amount, orderId) {
    var amt = Math.round(Number(amount) || 0);
    const url = 'https://img.vietqr.io/image/970422-0825825485-compact2.png?amount=' + amt + '&addInfo=' + encodeURIComponent(String(orderId || '')) + '&accountName=' + encodeURIComponent('LAM THI HONG NHU');
    document.getElementById('qr-img').src = url;
    document.getElementById('qr-memo').textContent = orderId;
  }
  function bankPollTick() {
    if (!currentOrderId || bankPollInFlight) return;
    bankPollInFlight = true;
    var expAmt = Math.round(Number(currentFinalAmount) || 0);
    api.callLong('checkBankTransferPayment', 55000, currentOrderId, expAmt).then(function (result) {
      bankPollInFlight = false;
      bankPollFailCount = 0;
      if (!result) return;
      if (result.status === 'paid') onPaySuccess();
      else if (result.status === 'partial') {
        var exp = Math.round(Number(result.expectedAmount) || expAmt);
        var paid = Math.round(Number(result.amountPaid) || 0);
        var rem = Math.max(0, exp - paid);
        document.getElementById('qr-amount-paid').textContent = fmt(paid);
        document.getElementById('qr-amount-remain').textContent = fmt(rem);
        document.getElementById('qr-partial-payment').style.display = 'block';
        document.getElementById('qr-amount-display').textContent = fmt(rem);
        updateQR(rem, currentOrderId);
      }
    }).catch(function () {
      bankPollInFlight = false;
      bankPollFailCount++;
      if (bankPollFailCount === 4) {
        showToast('⚠️ Đang khó kiểm tra CK tự động — kiểm tra mạng hoặc bấm xác nhận tay');
      }
    });
  }
  function startPolling() {
    stopPolling();
    bankPollInFlight = false;
    bankPollFailCount = 0;
    bankPollTick();
    // theo yêu cầu: dò Bank transfer mỗi 1 giây
    pollingInterval = setInterval(bankPollTick, 450);
  }
  function stopPolling() { if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; } bankPollInFlight = false; }
  async function cancelQrTransfer() {
    if (!currentOrderId) { showToast('⚠️ Không có đơn hàng!'); return; }
    var okDlg = await sunConfirm({
      title: 'Hủy đơn chuyển khoản',
      message: 'Hủy đơn ' + currentOrderId + ' đang chờ thanh toán chuyển khoản? (Đơn sẽ chuyển trạng thái Hủy)'
    });
    if (!okDlg) return;
    showLoading(true);
    try {
      var r = await api.callLong('cancelAwaitingBankOrder', 45000, currentOrderId);
      if (r && r.ok) {
        stopPolling();
        closeQrOverlay();
        showToast('✅ Đã hủy đơn chuyển khoản.');
        resetState();
      } else {
        showToast('❌ Không hủy được: ' + (r && r.message ? r.message : 'Lỗi'));
      }
    } catch (e) {
      showToast('❌ Không hủy được: ' + (e && e.message ? e.message : 'Lỗi'));
    } finally {
      showLoading(false);
    }
  }
  async function manualConfirmTransfer() {
    if (!currentOrderId) { showToast('⚠️ Không có đơn hàng!'); return; }
    var okDlg = await sunConfirm({
      title: 'Xác nhận thanh toán',
      message: 'Xác nhận đã nhận đủ tiền chuyển khoản cho đơn ' + currentOrderId + '? Chỉ dùng khi giao dịch đã về nhưng hệ thống chưa tự động khớp.'
    });
    if (!okDlg) return;
    showLoading(true);
    try {
      const ok = await api.callLong('confirmManualTransferPayment', 45000, currentOrderId);
      if (ok) onPaySuccess();
      else {
        var expR = Math.round(Number(currentFinalAmount) || 0);
        try {
          var r2 = await api.callLong('checkBankTransferPayment', 55000, currentOrderId, expR);
          if (r2 && r2.status === 'paid') onPaySuccess();
          else showToast('❌ Không thể xác nhận — kiểm tra sheet Đơn (cột Mã ĐH / Trạng thái) hoặc đơn đã hoàn tất.');
        } catch (eR) {
          showToast('❌ Không thể xác nhận — kiểm tra sheet Đơn (cột Mã ĐH / Trạng thái) hoặc đơn đã hoàn tất.');
        }
      }
    }
    catch (e) { showToast('❌ Lỗi xác nhận!'); }
    finally { showLoading(false); }
  }

  async function confirmCashRemainderFromQr() {
    if (!currentOrderId) { showToast('⚠️ Không có đơn hàng!'); return; }
    var ok2 = await sunConfirm({
      title: 'Thu tiền mặt bù phần thiếu',
      message: 'Xác nhận đã thu đủ phần còn lại bằng tiền mặt và hoàn tất đơn ' + currentOrderId + '?'
    });

    showLoading(true);
    try {

  function onPaySuccess() {
    stopPolling();
    closeQrOverlay();
    var oid = currentOrderId;
    var famt = Math.round(Number(currentFinalAmount) || 0);
    var snap = null;
    try { snap = JSON.parse(JSON.stringify(currentOrderData)); } catch (eSnap) { snap = currentOrderData; }
    playPaySuccessSound();
    showPaySuccessCelebration(oid);
    showToast('✅ Thanh toán thành công!');
    var doPrint = printInvoiceWhenPaid;
    printInvoiceWhenPaid = false;
    try { showFinalReceipt(oid, snap, doPrint); } catch (eUi) { showToast('❌ Lỗi hóa đơn: ' + (eUi && eUi.message ? eUi.message : eUi)); }

  function showFinalReceipt(orderId, data, autoPrintInvoice) {
    if (!data) return;
    const m = document.getElementById('receiptModal');
    if (!m) return;
    var rid = document.getElementById('r-order-id');
    var rc = document.getElementById('r-customer');
    var rp = document.getElementById('r-phone');
    var rit = document.getElementById('r-items');
    var rt = document.getElementById('r-total');
    if (rid) rid.textContent = '#' + orderId;
    if (rc) rc.textContent = data.customerName || 'Khách lẻ';
    if (rp) rp.textContent = data.customerPhone || '--';
    if (rit) {
      var items = data.items || [];
      rit.innerHTML = items.map(function (i) {
        var sub = buildCartOptsParts(i).join(', ');
        var note = (i.note && String(i.note).trim()) ? (' · Ghi chú: ' + String(i.note).trim()) : '';
        if (i.extraNuts && i.extraNuts.length) sub = (sub ? sub + ', ' : '') + 'Hạt: ' + i.extraNuts.join(', ');
        return '<div class="r-row item-row"><span>' + (parseInt(i.quantity, 10) || 1) + '× ' + esc(i.name || '') + (sub ? ' — ' + esc(sub) : '') + esc(note) + '</span><strong>' + fmt(i.totalPrice || 0) + '</strong></div>';
      }).join('');
    }
    var subtotal = Math.round(Number(data.totalAmount) || 0);
    var disc = Math.round(Number(data.discount) || 0);
    var pr = document.getElementById('r-pricing-block');
    if (pr) {
      pr.style.display = (disc > 0 || subtotal > 0) ? '' : 'none';
      var rs = document.getElementById('r-subtotal');
      if (rs) rs.textContent = fmt(subtotal);
      var rd = document.getElementById('r-discount-line');
      var rdv = document.getElementById('r-discount');
      if (disc > 0 && rd && rdv) {
        rd.style.display = '';
        rdv.textContent = '-' + fmt(disc);
      } else if (rd) rd.style.display = 'none';
      var rpl = document.getElementById('r-promo-line');
      var rpc = document.getElementById('r-promo-code');
      var pcm = data.promoCode ? String(data.promoCode).trim() : '';
      if (pcm && rpl && rpc) {
        rpl.style.display = '';
        rpc.textContent = pcm.toUpperCase();
      } else if (rpl) rpl.style.display = 'none';
    }
    if (rt) rt.textContent = fmt(data.finalAmount || 0);
    var rpb = document.getElementById('receipt-payment-block');
    if (rpb) rpb.style.display = 'none';
    var cs = document.getElementById('cash-section');
    if (cs) cs.classList.remove('show');
    var cprint = document.getElementById('complete-print-btn');
    if (cprint) cprint.style.display = 'none';
    const btn = document.getElementById('complete-btn');
    if (btn) {
      btn.classList.add('receipt-act-btn');
      btn.innerHTML = '<span class="receipt-act-ic"><i class="fa-solid fa-plus"></i></span><span class="receipt-act-txt">Đơn hàng mới</span>';
      btn.style.background = 'linear-gradient(135deg, var(--primary-lt), var(--primary-dk))';
      btn.onclick = function () {
        m.classList.remove('open');
        btn.style.background = '';
        var rp2 = document.getElementById('receipt-print-btn');
        if (rp2) {
          rp2.style.display = 'none';
          rp2.onclick = null;
          rp2.innerHTML = '<span class="receipt-act-ic"><i class="fa-solid fa-print"></i></span><span class="receipt-act-txt">In hóa đơn</span>';
        }
        if (cprint) {
          cprint.style.display = '';
          cprint.classList.add('receipt-act-btn');
          cprint.innerHTML = '<span class="receipt-act-ic"><i class="fa-solid fa-print"></i></span><span class="receipt-act-txt">In + Thanh toán</span>';
          cprint.onclick = function () { completeOrder(true); };
        }
      };
    }
    var rprint = document.getElementById('receipt-print-btn');
    if (rprint) {
      rprint.style.display = '';
      rprint.classList.add('receipt-act-btn');
      rprint.innerHTML = '<span class="receipt-act-ic"><i class="fa-solid fa-print"></i></span><span class="receipt-act-txt">In hóa đơn</span>';
      rprint.onclick = function () { printSunInvoice(orderId, data); };
    }
    sunModalRaise('receiptModal');
    m.classList.add('open');
    if (autoPrintInvoice) {
      try { printSunInvoice(orderId, data); } catch (eA) { }
    }
  }

  function selectGoal(el, g) {

    el.classList.add('selected');
    selectedGoal = g;
