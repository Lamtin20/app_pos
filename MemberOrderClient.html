<script>
  (function (global) {
    'use strict';
    if (global.MemOrder && global.MemOrder.bootstrap) {
      try { global.MemOrder.bootstrap(); } catch (eBootDup) { }
      return;
    }
    var mixHatList = [];
    var cart = [];
    var currentProduct = null;
    var currentQty = 1;
    var currentOptions = {
      size: 'Thường (350ml)', sizePrice: 0, ice: 'Không đá', sweetness: 'Ngọt vừa',
      addons: [], addonPrices: [], serveTemp: 'cold_steep', packaging: 'paper',
      packagingPrice: 0, familyPack: false
    };
    var discount = 0;
    var appliedPromo = '';
    var pendingPromo = '';
    var fulfillment = 'pickup';
    var pay = 'Thanh toán khi nhận';
    var zonesLoaded = false;
    var wired = false;
    // ----- Đơn nhóm (kiểu GrabFood) -----
    var group = null;              // trạng thái nhóm từ server {groupId, hostPhone, status, members, total, ...}
    var groupPollTimer = null;
    var groupSyncTimer = null;
    var groupSyncBusy = false;
    var groupSyncAgain = false;
    var pendingGroupCode = '';
    // Màn hình chờ nhận nước (thành viên nhóm, sau khi trưởng nhóm gửi đơn)
    var awaitInfo = null;          // {orderId, groupId, groupName, name, items, stage, ts}
    var awaitPollTimer = null;
  
    function $(id) { return document.getElementById(id); }
    function esc(s) {
      if (global.esc) return global.esc(s);
      var d = document.createElement('div');
      d.textContent = s == null ? '' : s;
      return d.innerHTML;
    }
    function escAttr(s) {
      return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;');
    }
    function fmt(n) {
      return global.fmt ? global.fmt(n) : (Math.round(n || 0).toLocaleString('vi-VN') + '₫');
    }
    function toast(m) {
      if (global.showToast) global.showToast(m);
      else {
        var t = $('mem-pd-toast');
        if (t) { t.textContent = m; t.classList.add('show'); setTimeout(function () { t.classList.remove('show'); }, 2800); }
      }
    }
    function api() {
      var args = Array.prototype.slice.call(arguments);
      return global.api.apply(null, args);
    }
    function phone() {
      return global.SUN_MEM && global.SUN_MEM.state ? global.SUN_MEM.state.phone : '';
    }
    function normalizeMemCategory(raw) {
      var orig = String(raw || '').trim();
      var s = orig.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
      if (!s) return '';
      if (/topping/.test(s)) return 'Topping';
      if (/mix/.test(s) || /sua mix/.test(s)) return 'Mix hạt';
      if (/coffee|cafe|ca phe|caphe/.test(s)) return 'Coffee';
      if (/matcha/.test(s)) return 'Matcha';
      if (/tra trai cay|tra trai|tra/.test(s)) return 'Trà trái cây';
      if (/sua|hat|sua don|sua hat|sua don/.test(s)) return 'Sữa hạt';
      var exact = ['Sữa hạt', 'Mix hạt', 'Coffee', 'Topping', 'Matcha', 'Trà trái cây'];
      if (exact.indexOf(orig) >= 0) return orig;
      return 'Sữa hạt';
    }
    var MEM_CAT_LIST = ['Sữa hạt', 'Mix hạt', 'Coffee', 'Topping', 'Matcha', 'Trà trái cây'];
    function menuRaw() {
      var st = global.SUN_MEM && global.SUN_MEM.state;
      if (st && st.menu && st.menu.length) return st.menu;
      return global.__memMenuCache || [];
    }
  
    function normalizeCupSizeLabel(s) {
      return String(s || '').replace(/\s+/g, ' ').trim();
    }
    function serveTempLabel(st) {
      if (st === 'hot') return 'Sữa nóng';
      if (st === 'iced') return 'Đá';
      return 'Sữa ủ lạnh';
    }
    function lineUnit(item) {
      var o = item.options || {};
      var addonTotal = (o.addonPrices || []).reduce(function (a, p) { return a + p; }, 0);
      return (item.basePrice || 0) + (o.sizePrice || 0) + addonTotal + (o.packagingPrice || 0);
    }
    function cartSubtotal() {
      return cart.reduce(function (s, it) { return s + lineUnit(it) * (it.quantity || 1); }, 0);
    }
    function cartQty() {
      return cart.reduce(function (s, it) { return s + (it.quantity || 1); }, 0);
    }
    function cartForPromoApi() {
      return cart.map(function (it) {
        return { id: it.id, name: it.name, qty: it.quantity, quantity: it.quantity, price: lineUnit(it) };
      }).concat(groupOthersItemsForApi());
    }
    function cartSummaryJson() {
      return JSON.stringify(cart.map(function (it) {
        return { id: it.id, quantity: it.quantity || 1 };
      }).concat(groupOthersItemsForApi().map(function (it) {
        return { id: it.id, quantity: it.quantity || 1 };
      })));
    }
    function buildOptsParts(item) {
      var o = item.options || {};
      if (normalizeCupSizeLabel(o.size) === 'Tiêu chuẩn') {
        return [o.sweetness].concat(o.addons || []).filter(Boolean);
      }
      var parts = [o.size];
      var st = o.serveTemp || 'cold_steep';
      if (st === 'iced' && o.ice) parts.push('Đá: ' + o.ice);
      else parts.push(serveTempLabel(st));
      if (o.sweetness) parts.push(o.sweetness);
      if (o.packaging === 'plastic') parts.push('Chai nhựa');
      else if (o.packaging === 'paper') parts.push('Ly giấy');
      return parts.concat(o.addons || []).filter(Boolean);
    }
  
    function familyUnit500(p) {
      var sell = parseFloat(p.familySell500) || 0;
      if (sell > 0) return sell;
      var ex = parseFloat(p.familyPackExtra500) || 0;
      return ex > 0 ? (parseFloat(p.basePrice) || 0) + ex : 0;
    }
    function familyUnit1L(p) {
      var sell = parseFloat(p.familySell1L) || 0;
      if (sell > 0) return sell;
      var ex = parseFloat(p.familyPackExtra1L) || 0;
      return ex > 0 ? (parseFloat(p.basePrice) || 0) + ex : 0;
    }
    function hasFamily(p) {
      return familyUnit500(p) > 0 || familyUnit1L(p) > 0;
    }
    function cupParts(p) {
      var smallDisc = Math.max(0, parseFloat(p.smallCupDiscount) || 0);
      var large = parseFloat(p.largeCupExtra);
      if (isNaN(large)) large = 8000;
      var parts = [];
      if (p.enableSmall) parts.push({ label: 'Nhỏ', sub: '250ml', val: 'Nhỏ (250ml)', price: -smallDisc, icon: '🥛' });
      if (p.enableRegular !== false) parts.push({ label: 'Thường', sub: '350ml', val: 'Thường (350ml)', price: 0, icon: '🥤' });
      if (p.enableLarge !== false) parts.push({ label: 'Lớn', sub: '+' + fmt(large), val: 'Lớn (450ml)', price: large, icon: '🧃' });
      if (!parts.length) parts.push({ label: 'Thường', sub: '350ml', val: 'Thường (350ml)', price: 0, icon: '🥤' });
      return parts;
    }
    function familyParts(p) {
      var parts = [];
      var u5 = familyUnit500(p);
      var u1 = familyUnit1L(p);
      var bp = parseFloat(p.basePrice) || 0;
      if (u5 > 0) parts.push({ label: 'Chai 500ml', sub: fmt(u5), val: 'Chai gia đình 500ml', price: Math.round(u5 - bp), icon: '🧴' });
      if (u1 > 0) parts.push({ label: 'Chai 1 lít', sub: fmt(u1), val: 'Chai gia đình 1 lít', price: Math.round(u1 - bp), icon: '🧴' });
      return parts;
    }
    function paintSizes(parts, defIdx) {
      var el = $('mem-sheet-size-options');
      if (!el || !parts.length) return;
      var html = '';
      for (var j = 0; j < parts.length; j++) {
        var q = parts[j];
        html += '<button type="button" class="size-btn' + (j === defIdx ? ' active' : '') + '" data-val="' + escAttr(q.val) + '" data-price="' + q.price + '">' +
          '<span class="sz-icon">' + q.icon + '</span><div class="sz-name">' + esc(q.label) + '</div><div class="sz-price">' + esc(q.sub) + '</div></button>';
      }
      el.innerHTML = html;
      el.querySelectorAll('.size-btn').forEach(function (btn) {
        btn.onclick = function () {
          el.querySelectorAll('.size-btn').forEach(function (b) { b.classList.remove('active'); });
          btn.classList.add('active');
          currentOptions.size = btn.getAttribute('data-val');
          currentOptions.sizePrice = parseFloat(btn.getAttribute('data-price')) || 0;
          if (String(currentOptions.size).indexOf('Chai gia đình') === 0) currentOptions.familyPack = true;
          else currentOptions.familyPack = false;
          updateModalPrice();
        };
      });
      currentOptions.size = parts[defIdx].val;
      currentOptions.sizePrice = parts[defIdx].price;
    }
    function renderSizeGrid() {
      var p = currentProduct;
      if (!p) return;
      var parts = currentOptions.familyPack ? familyParts(p) : cupParts(p);
      if (currentOptions.familyPack && !parts.length) {
        currentOptions.familyPack = false;
        var cb = $('mem-family-pack-toggle');
        if (cb) cb.checked = false;
        parts = cupParts(p);
      }
      var defIdx = 0;
      var want = currentOptions.familyPack ? 'Chai gia đình 500ml' : 'Thường (350ml)';
      for (var i = 0; i < parts.length; i++) { if (parts[i].val === want) { defIdx = i; break; } }
      paintSizes(parts, defIdx);
    }
    function renderNutMix(p, isTopping) {
      var grp = $('mem-nut-opt-group');
      var chips = $('mem-nut-chips');
      if (!grp || !chips) return;
      if (!p || isTopping) { grp.style.display = 'none'; return; }
      var list = mixHatList.filter(function (x) { return x && x.enabled !== false && x.name; });
      if (!list.length) { grp.style.display = 'none'; return; }
      grp.style.display = '';
      chips.innerHTML = list.map(function (n) {
        var mixP = Math.round(parseFloat(n.price) || 0);
        var img = String(n.imageUrl || '').trim();
        var imgH = img ? ('<img class="nut-chip-img" src="' + escAttr(img) + '" alt="" loading="lazy" decoding="async">') : '<div class="nut-chip-img nut-chip-ph">🌰</div>';
        return '<button type="button" class="opt-btn opt-nut-chip" data-addon="' + escAttr(n.name) + '" data-price="' + mixP + '">' + imgH +
          '<div class="nut-chip-meta"><div class="nut-chip-name">' + esc(n.name) + '</div><div class="nut-chip-price">' + (mixP > 0 ? '+' + fmt(mixP) : '') + '</div></div></button>';
      }).join('');
      chips.querySelectorAll('.opt-nut-chip').forEach(function (btn) {
        btn.onclick = function () { toggleAddon(btn, btn.getAttribute('data-addon'), parseFloat(btn.getAttribute('data-price')) || 0); };
      });
    }
    function escWithBr(s) {
      return String(s || '').split('\n').map(function (line) { return esc(line); }).join('<br>');
    }
    function textNeedsExpandMore(s) {
      s = String(s || '').trim();
      if (!s) return false;
      if (s.length > 110) return true;
      if ((s.match(/\n/g) || []).length >= 2) return true;
      return false;
    }
    function previewPlainText(s) {
      var t = String(s || '').replace(/\s+/g, ' ').trim();
      if (t.length <= 110) return t;
      var cut = 110;
      var sp = t.lastIndexOf(' ', 110);
      if (sp > 55) cut = sp;
      return t.slice(0, cut) + '…';
    }
    function buildExpandableTextCard(title, fullRaw) {
      var full = String(fullRaw || '').trim();
      if (!full) return '';
      if (!textNeedsExpandMore(full)) {
        return '<div class="mem-pd-meta-card"><div class="mem-pd-meta-t">' + esc(title) + '</div><div class="mem-pd-meta-b">' + escWithBr(full) + '</div></div>';
      }
      var prev = full.indexOf('\n') >= 0 ? (full.split('\n')[0].trim() + '…') : previewPlainText(full);
      return '<div class="mem-pd-meta-card mem-pd-desc-card" data-expanded="0">' +
        '<div class="mem-pd-meta-t">' + esc(title) + '</div>' +
        '<div class="mem-pd-desc-preview">' + esc(prev) + '</div>' +
        '<div class="mem-pd-desc-full" style="display:none">' + escWithBr(full) + '</div>' +
        '<button type="button" class="mem-pd-desc-toggle-btn">Xem thêm</button></div>';
    }
    function buildPrimaryNarrativeCard(title, fullRaw, hasExtra) {
      var full = String(fullRaw || '').trim();
      if (!full) return '';
      if (!hasExtra) return buildExpandableTextCard(title, fullRaw);
      if (textNeedsExpandMore(full)) {
        var prev = full.indexOf('\n') >= 0 ? (full.split('\n')[0].trim() + '…') : previewPlainText(full);
        return '<div class="mem-pd-meta-card mem-pd-desc-card mem-pd-primary-desc" data-expanded="0">' +
          '<div class="mem-pd-meta-t">' + esc(title) + '</div>' +
          '<div class="mem-pd-desc-preview">' + esc(prev) + '</div>' +
          '<div class="mem-pd-desc-full" style="display:none">' + escWithBr(full) + '</div></div>';
      }
      return '<div class="mem-pd-meta-card"><div class="mem-pd-meta-t">' + esc(title) + '</div><div class="mem-pd-meta-b">' + escWithBr(full) + '</div></div>';
    }
    function wireMemProductMetaReveal(box) {
      var revealBtn = document.getElementById('mem-pd-meta-reveal-btn');
      var extraEl = document.getElementById('mem-product-detail-meta-extra');
      if (!box || !revealBtn || !extraEl) return;
      revealBtn.addEventListener('click', function () {
        var expanded = box.getAttribute('data-detail-expanded') === '1';
        expanded = !expanded;
        box.setAttribute('data-detail-expanded', expanded ? '1' : '0');
        extraEl.style.display = expanded ? 'block' : 'none';
        revealBtn.textContent = expanded ? 'Thu gọn' : 'Xem thêm';
        var primaryDesc = box.querySelector('.mem-pd-primary-desc');
        if (primaryDesc) {
          var prev = primaryDesc.querySelector('.mem-pd-desc-preview');
          var full = primaryDesc.querySelector('.mem-pd-desc-full');
          if (prev && full) {
            prev.style.display = expanded ? 'none' : '';
            full.style.display = expanded ? '' : 'none';
          }
        }
      });
    }
    function wireMemProductDescToggles(box) {
      if (!box) return;
      var extraWrap = box.querySelector('.mem-pd-meta-extra-wrap');
      var btns = extraWrap
        ? extraWrap.querySelectorAll('.mem-pd-desc-card .mem-pd-desc-toggle-btn')
        : box.querySelectorAll('.mem-pd-desc-card .mem-pd-desc-toggle-btn');
      for (var bi = 0; bi < btns.length; bi++) {
        btns[bi].addEventListener('click', function (ev) {
          var btn = ev.currentTarget;
          var card = btn.closest('.mem-pd-desc-card');
          if (!card) return;
          var expanded = card.getAttribute('data-expanded') === '1';
          expanded = !expanded;
          card.setAttribute('data-expanded', expanded ? '1' : '0');
          var prev = card.querySelector('.mem-pd-desc-preview');
          var full = card.querySelector('.mem-pd-desc-full');
          if (prev) prev.style.display = expanded ? 'none' : '';
          if (full) full.style.display = expanded ? '' : 'none';
          btn.textContent = expanded ? 'Thu gọn' : 'Xem thêm';
        });
      }
    }
    function renderMeta(p) {
      var box = $('mem-product-detail-meta');
      if (!box || !p) return;
      var desc = String(p.description || '').trim();
      var note = String(p.note || '').trim();
      var k = p.nutritionKcal || 0, pr = p.nutritionProteinG || 0, ft = p.nutritionFatG || 0;
      var benFull = String(p.benefits || '').trim();
      var mark = 'Mở rộng cho admin';
      var ix = benFull.toLowerCase().indexOf(mark.toLowerCase());
      var benCust = ix >= 0 ? benFull.slice(0, ix).trim() : benFull;
      var benAdm = ix >= 0 ? benFull.slice(ix).trim() : '';
      var ingList = [];
      if (Array.isArray(p.ingredientNames) && p.ingredientNames.length) {
        ingList = p.ingredientNames.map(function (x) { return String(x || '').trim(); }).filter(Boolean);
      } else if (Array.isArray(p.ingredients)) {
        p.ingredients.forEach(function (i) {
          if (!i) return;
          var nm = typeof i === 'string' ? i.trim() : (i.name && String(i.name).trim());
          if (nm) ingList.push(nm);
        });
      }
      var seen = {};
      ingList = ingList.filter(function (n) { if (seen[n]) return false; seen[n] = true; return true; });
  
      var extraParts = [];
      if (desc && note && note !== desc) {
        extraParts.push(buildExpandableTextCard('Ghi chú (menu)', note));
      }
      if (k || pr || ft) {
        extraParts.push(
          '<div class="mem-pd-meta-card"><div class="mem-pd-meta-t"><i class="fa-solid fa-chart-pie" aria-hidden="true"></i> Dinh dưỡng (ước)</div><div class="mem-pd-meta-pills">' +
          (k ? '<span class="mem-pd-meta-pill"><i class="fa-solid fa-fire-flame-simple" aria-hidden="true"></i> Calo ~' + esc(String(k)) + '</span>' : '') +
          (pr ? '<span class="mem-pd-meta-pill"><i class="fa-solid fa-drumstick-bite" aria-hidden="true"></i> Protein ~' + esc(String(pr)) + 'g</span>' : '') +
          (ft ? '<span class="mem-pd-meta-pill"><i class="fa-solid fa-droplet" aria-hidden="true"></i> Béo ~' + esc(String(ft)) + 'g</span>' : '') +
          '</div></div>'
        );
      }
      if (benCust) {
        extraParts.push('<div class="mem-pd-meta-card"><div class="mem-pd-meta-t"><i class="fa-solid fa-heart-pulse" aria-hidden="true"></i> Công dụng</div><div class="mem-pd-meta-b">' + escWithBr(benCust) + '</div></div>');
      }
      if (benAdm) {
        extraParts.push('<div class="mem-pd-meta-card mem-pd-meta-card--muted"><div class="mem-pd-meta-t"><i class="fa-solid fa-user-shield" aria-hidden="true"></i> Tham khảo thêm</div><div class="mem-pd-meta-b">' + escWithBr(benAdm) + '</div></div>');
      }
      if (ingList.length) {
        extraParts.push('<div class="mem-pd-meta-card"><div class="mem-pd-meta-t"><i class="fa-solid fa-seedling" aria-hidden="true"></i> Thành phần</div><ul class="mem-pd-meta-ing">' +
          ingList.map(function (n) { return '<li>' + esc(n) + '</li>'; }).join('') + '</ul></div>');
      }
  
      var hasExtra = extraParts.length > 0;
      var primary = '';
      if (desc) {
        primary = buildPrimaryNarrativeCard('Mô tả', desc, hasExtra);
      } else if (note) {
        primary = buildPrimaryNarrativeCard('Ghi chú', note, hasExtra);
      } else if (hasExtra) {
        primary = '<div class="mem-pd-meta-card mem-pd-meta-muted">Chưa có mô tả ngắn trên menu.</div>';
      }
  
      var html = '';
      if (!primary && !hasExtra) {
        box.innerHTML = '<p class="mem-pd-meta-muted">Chưa có mô tả chi tiết.</p>';
        return;
      }
  
      html = '<div class="mem-pd-meta-layout" id="mem-pd-meta-layout-root" data-detail-expanded="0">' +
        '<div class="mem-pd-meta-primary">' + primary + '</div>';
      if (hasExtra) {
        html += '<button type="button" class="mem-pd-meta-reveal-btn" id="mem-pd-meta-reveal-btn">Xem thêm</button>' +
          '<div class="mem-pd-meta-extra-wrap" id="mem-product-detail-meta-extra" style="display:none">' + extraParts.join('') + '</div>';
      }
      html += '</div>';
      box.innerHTML = html;
      var root = document.getElementById('mem-pd-meta-layout-root');
      wireMemProductMetaReveal(root || box);
      wireMemProductDescToggles(root || box);
    }
    function updateModalPrice() {
      if (!currentProduct) return;
      var addonTotal = currentOptions.addonPrices.reduce(function (s, p) { return s + p; }, 0);
      var unit = currentProduct.basePrice + currentOptions.sizePrice + addonTotal + (currentOptions.packagingPrice || 0);
      var total = unit * currentQty;
      var sp = $('mem-sheet-price'); if (sp) sp.textContent = fmt(unit);
      var at = $('mem-sheet-add-total'); if (at) at.textContent = fmt(total);
    }
    function selectOpt(groupEl, group, value, price) {
      if (group === 'ice' || group === 'sweetness') {
        groupEl.parentNode.querySelectorAll('.opt-btn').forEach(function (b) { b.classList.remove('active'); });
        groupEl.classList.add('active');
        currentOptions[group] = value;
      }
      updateModalPrice();
    }
    function toggleAddon(el, value, price) {
      var idx = currentOptions.addons.indexOf(value);
      if (idx > -1) {
        currentOptions.addons.splice(idx, 1);
        currentOptions.addonPrices.splice(idx, 1);
        el.classList.remove('active');
      } else {
        currentOptions.addons.push(value);
        currentOptions.addonPrices.push(price);
        el.classList.add('active');
      }
      updateModalPrice();
    }
    function selectServeTemp(el, mode) {
      document.querySelectorAll('#mem-sheet-temp-options .opt-btn').forEach(function (b) { b.classList.remove('active'); });
      el.classList.add('active');
      currentOptions.serveTemp = mode;
      var iceG = $('mem-sheet-ice-group');
      if (iceG) {
        if (mode === 'iced') {
          iceG.style.display = '';
          iceG.querySelectorAll('.opt-btn').forEach(function (b) { b.classList.remove('active'); });
          var mid = iceG.querySelector('.opt-btn[data-ice="Vừa"]');
          if (mid) { mid.classList.add('active'); currentOptions.ice = 'Vừa'; }
        } else {
          iceG.style.display = 'none';
          currentOptions.ice = 'Không đá';
        }
      }
      updateModalPrice();
    }
    function selectPackaging(el, pack) {
      document.querySelectorAll('#mem-sheet-pack-options .opt-btn').forEach(function (b) { b.classList.remove('active'); });
      el.classList.add('active');
      currentOptions.packaging = pack;
      currentOptions.packagingPrice = (pack === 'plastic' && currentProduct) ? (parseFloat(currentProduct.plasticBottleExtra) || 0) : 0;
      updateModalPrice();
    }
    function changeQty(d) {
      currentQty = Math.max(1, currentQty + d);
      var qd = $('mem-qty-display'); if (qd) qd.textContent = currentQty;
      updateModalPrice();
    }
    function closeModal(e) {
      if (e && e.target && e.target.id !== 'mem-product-modal' && e.target.id !== 'mem-pd-close') return;
      var m = $('mem-product-modal');
      if (m) {
        m.classList.remove('open');
        m.classList.add('mem-hidden');
        m.setAttribute('hidden', '');
        m.setAttribute('aria-hidden', 'true');
      }
      document.body.style.overflow = '';
    }
    function openProduct(p) {
      if (!p) return;
      currentProduct = p;
      currentQty = 1;
      currentOptions = {
        size: 'Thường (350ml)', sizePrice: 0, ice: 'Không đá', sweetness: 'Ngọt vừa',
        addons: [], addonPrices: [], serveTemp: 'cold_steep', packaging: 'paper',
        packagingPrice: 0, familyPack: false
      };
      var nm = $('mem-sheet-name'); if (nm) nm.textContent = p.name || '';
      var qd = $('mem-qty-display'); if (qd) qd.textContent = '1';
      var note = $('mem-modal-note'); if (note) note.value = '';
      var hero = $('mem-sheet-hero');
      var emoji = $('mem-sheet-hero-emoji');
      var url = p.coverImageUrl || p.imageUrl || '';
      if (hero) {
        hero.querySelectorAll('img.hero-img').forEach(function (e) { e.remove(); });
        if (url) {

      });
      document.querySelectorAll('#mem-product-modal .opt-btn[data-addon]:not(.opt-nut-chip)').forEach(function (b) {
        b.onclick = function () { toggleAddon(b, b.getAttribute('data-addon'), parseFloat(b.getAttribute('data-price')) || 0); };
      });
      var sugarToggle = $('mem-sugar-toggle');
      if (sugarToggle) sugarToggle.onclick = function () {
        var sub = $('mem-sugar-sub-options');
        if (sub) sub.classList.toggle('show');
        sugarToggle.classList.toggle('active');
      };
      var famCb = $('mem-family-pack-toggle');
      if (famCb) famCb.onchange = function () {
        currentOptions.familyPack = !!famCb.checked;
        renderSizeGrid();
        updateModalPrice();
      };
      var qm = $('mem-qty-minus'); if (qm) qm.onclick = function () { changeQty(-1); };
      var qp = $('mem-qty-plus'); if (qp) qp.onclick = function () { changeQty(1); };
      var addBtn = $('mem-sheet-add-btn');
      if (addBtn) addBtn.onclick = addToCart;
      document.querySelectorAll('#mem-cart-fulfillment button').forEach(function (b) {
        b.onclick = function () {
          document.querySelectorAll('#mem-cart-fulfillment button').forEach(function (x) { x.classList.remove('on'); });
          b.classList.add('on');
          fulfillment = b.getAttribute('data-f');
          var ab = $('mem-cart-addr-block');
          if (ab) ab.style.display = fulfillment === 'delivery' ? 'block' : 'none';
        };
      });
      document.querySelectorAll('#mem-cart-pay button').forEach(function (b) {
        b.onclick = function () {
          document.querySelectorAll('#mem-cart-pay button').forEach(function (x) { x.classList.remove('on'); });
          b.classList.add('on');
          pay = b.getAttribute('data-p');
          qrOrderLock = null;
          updateCartQr();
        };
      });
      var qc = $('mem-cart-qr-copy');
      if (qc) qc.onclick = function () {
        var done = function () { toast('📋 Đã copy số tài khoản ' + BANK_QR.acc); };
        if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(BANK_QR.acc).then(done);
        else { prompt('Copy số tài khoản:', BANK_QR.acc); }
      };
      var pa = $('mem-cart-promo-apply');
      if (pa) pa.onclick = function () {
        var inp = $('mem-cart-promo-input');
        applyPromo(inp ? inp.value : '', false);
      };
      var sub = $('mem-cart-submit');
      if (sub) sub.onclick = submitOrder;
    }
  
    function bootstrap() {
      wireOnce();
      api('getMixHats').then(function (list) {
        mixHatList = Array.isArray(list) ? list : [];
      }).catch(function () { mixHatList = []; });
      if (memberId()) restoreGroupSession();
    }
  
    global.MemOrder = {
      bootstrap: bootstrap,
      createGroup: createGroup,
      joinGroup: joinGroup,
      leaveGroup: leaveGroup,
      inGroup: inGroup,
      isHost: isHost,
      isGuest: isGuest,
      guestName: guestName,
      groupState: function () { return group; },
      pendingGroup: pendingGroup,
      consumePendingGroupJoin: consumePendingGroupJoin,
      restoreGroupSession: restoreGroupSession,
      setPendingGroupCode: function (code) {
        pendingGroupCode = String(code || '').trim().toUpperCase();
        lsSet('sun_group_pending', pendingGroupCode);
        try { sessionStorage.setItem('sun_group_pending', pendingGroupCode); } catch (e) { }
      },
      openProduct: openProduct,
      openProductById: openProductById,
      quickAddProduct: quickAddProduct,
      openProductByIdOrFetch: function (id) {
        if (openProductById(id)) return Promise.resolve(true);
        return api('getMenu').then(function (list) {
          global.__memMenuCache = list || [];
          if (global.SUN_MEM && global.SUN_MEM.state) global.SUN_MEM.state.menu = list || [];
          return openProductById(id);
        });
      },
      renderCartPage: renderCartPage,
      syncNavBadge: syncNavBadge,
      cartQty: cartQty,
      setPendingPromo: function (code) { pendingPromo = String(code || '').trim().toUpperCase(); },
      consumePendingPromo: function () {
        var c = pendingPromo;
        pendingPromo = '';
        if (c) {
          var inp = $('mem-cart-promo-input');
          if (inp) inp.value = c;
          toast('Thêm món rồi chọn hoặc áp mã ' + c);
        }
      },
      hasAwait: hasAwait,
      normalizeCategory: normalizeMemCategory,
      categoryList: function () { return MEM_CAT_LIST.slice(); }
    };
    loadAwait();
    try { wireOnce(); } catch (eWire) { }
    try { bootstrap(); } catch (eBoot) { }
  })(typeof window !== 'undefined' ? window : this);
  </script>
