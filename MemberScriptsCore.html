<script>
try { var SCRIPT_URL = __SUN_URL_INJECT__; } catch (e) { var SCRIPT_URL = ''; }
if (typeof SCRIPT_URL === 'undefined') var SCRIPT_URL = '';
function posBase() {
  if (typeof window !== 'undefined' && window.location && window.location.origin) {
    return window.location.origin;
  }
  var u = (typeof SCRIPT_URL === 'string' && SCRIPT_URL) ? SCRIPT_URL.split('?')[0] : '';
  return u || '';
}
function memPage(p) {
  var m = { admin: '/admin', order: '/order', member: '/member', pickup: '/pickup' };
  return m[p] || ('/' + p);
}

function gsErrMessage(e) {
  if (e == null) return 'Lỗi không xác định';
  if (typeof e === 'string') return e;
  if (e.message) return String(e.message);
  if (e.details) return String(e.details);
  try { return JSON.stringify(e); } catch (x) { return String(e); }
}
function api(method) {
  var args = Array.prototype.slice.call(arguments, 1);
  if (window.SUN_API && typeof window.SUN_API.api === 'function') {
    return window.SUN_API.api.apply(window.SUN_API, [method].concat(args));
  }
  return new Promise(function (resolve, reject) {
    var t = setTimeout(function () { reject(new Error('Hết thời gian chờ, bạn thử lại nhé.')); }, 42000);
    try {
      var runner = google.script.run
        .withSuccessHandler(function (r) { clearTimeout(t); resolve(r); })
        .withFailureHandler(function (e) { clearTimeout(t); reject(new Error(gsErrMessage(e))); });
      runner[method].apply(runner, args);
    } catch (e) { clearTimeout(t); reject(new Error(gsErrMessage(e))); }
  });
}
function apiLong(method, ms) {
  var args = Array.prototype.slice.call(arguments, 2);
  if (window.SUN_API && typeof window.SUN_API.apiLong === 'function') {
    return window.SUN_API.apiLong.apply(window.SUN_API, [method, ms].concat(args));
  }
  return new Promise(function (resolve, reject) {
    var t = setTimeout(function () { reject(new Error('Hết thời gian chờ, bạn thử lại nhé.')); }, ms || 55000);
    try {
      var runner = google.script.run
        .withSuccessHandler(function (r) { clearTimeout(t); resolve(r); })
        .withFailureHandler(function (e) { clearTimeout(t); reject(new Error(gsErrMessage(e))); });
      runner[method].apply(runner, args);
    } catch (e) { clearTimeout(t); reject(new Error(gsErrMessage(e))); }
  });
}
function portalMemberLookupHttp(phone) {
  return fetch('/api/member/portal?phone=' + encodeURIComponent(String(phone || '')), {
    method: 'GET',
    credentials: 'same-origin',
    cache: 'no-store',
  }).then(function (res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  });
}
function portalMemberBootstrapHttp() {
  return fetch('/api/member/bootstrap', {
    method: 'GET',
    credentials: 'same-origin',
    cache: 'no-store',
  }).then(function (res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  });
}
function fetchMemberNotificationsHttp(phone, accountMeta) {
  var url = '/api/member/notifications?phone=' + encodeURIComponent(String(phone || ''));
  if (accountMeta && typeof accountMeta === 'object') {
    url += '&accountMeta=' + encodeURIComponent(JSON.stringify(accountMeta));
  }
  return fetch(url, {
    method: 'GET',
    credentials: 'same-origin',
    cache: 'no-store',
  }).then(function (res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  });
}
function showToast(msg) {
  var el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function () { el.classList.remove('show'); }, 2800);
}
function normPhone(v) {
  var d = String(v || '').replace(/\D/g, '');
  if (!d) return '';
  if (d.indexOf('84') === 0 && d.length >= 10) d = '0' + d.slice(2);
  if (d.length === 9 && d.charAt(0) !== '0') d = '0' + d;
  return d;
}
function isPhone10(ph) {
  return /^0\d{9}$/.test(String(ph || ''));
}
function esc(s) {
  var d = document.createElement('div');
  d.textContent = s == null ? '' : s;
  return d.innerHTML;
}
function fmt(n) { return Math.round(n || 0).toLocaleString('vi-VN') + '₫'; }

var memberPortalSettings = null;
var memCarouselTimer = null;
var memCarouselIndex = 0;

function stopMemCarousel() {
  if (memCarouselTimer) { clearInterval(memCarouselTimer); memCarouselTimer = null; }
}
function buildMemCarouselSlides(banners) {
  var box = document.getElementById('mem-carousel');
  var dots = document.getElementById('mem-carousel-dots');
  var carWrap = document.getElementById('mem-carousel-wrap');
  if (!box || !dots) return;
  stopMemCarousel();
  var list = (Array.isArray(banners) ? banners : []).filter(function (b) {
    return b && String(b.image || '').trim();
  });
  if (!list.length) {
    box.innerHTML = '';
    dots.innerHTML = '';
    if (carWrap) {
      carWrap.classList.add('mem-hidden');
      carWrap.setAttribute('aria-hidden', 'true');
    }
    return;
  }
  if (carWrap) {
    carWrap.classList.remove('mem-hidden');
    carWrap.setAttribute('aria-hidden', 'false');
  }
  box.innerHTML = list.map(function (b, i) {
    var img = String(b.image || '').replace(/\\/g, '/').replace(/'/g, '%27');
    var bd = esc(b.badge || '');
    var t = esc(b.title || '');
    var s = esc(b.subtitle || '');
    return '<div class="mem-slide' + (i === 0 ? ' on' : '') + '" data-i="' + i + '" style="background-image:url(\'' + img + '\');">' +
      '<div class="mem-slide-cap">' + (bd ? '<span class="bdg">' + bd + '</span>' : '') +
      (t ? '<h3>' + t + '</h3>' : '') + (s ? '<p>' + s + '</p>' : '') + '</div></div>';
  }).join('');
  dots.innerHTML = list.map(function (_b, i) {
    return '<button type="button" aria-label="Slide ' + (i + 1) + '" class="' + (i === 0 ? 'on' : '') + '" data-i="' + i + '"></button>';
  }).join('');
  memCarouselIndex = 0;
  if (dots) dots.style.display = list.length > 1 ? 'flex' : 'none';
  if (list.length < 2) return;
  memCarouselTimer = setInterval(function () {
    memCarouselIndex = (memCarouselIndex + 1) % list.length;
    box.querySelectorAll('.mem-slide').forEach(function (sl, j) { sl.classList.toggle('on', j === memCarouselIndex); });
    dots.querySelectorAll('button').forEach(function (d, j) { d.classList.toggle('on', j === memCarouselIndex); });
  }, 5200);
  dots.querySelectorAll('button').forEach(function (btn) {
    btn.onclick = function () {
      var ix = parseInt(btn.getAttribute('data-i'), 10) || 0;
      memCarouselIndex = ix;
      box.querySelectorAll('.mem-slide').forEach(function (sl, j) { sl.classList.toggle('on', j === ix); });
      dots.querySelectorAll('button').forEach(function (d, j) { d.classList.toggle('on', j === ix); });
    };
  });
}

  setTxt('mem-disp-menu-hero-sub', s.menuHeroSubtitle);
  var hi = document.getElementById('mem-disp-hero-img');
  if (hi && s.heroImageUrl) hi.src = s.heroImageUrl;

  if (gateHero && s.heroImageUrl) gateHero.src = s.heroImageUrl;

  var th = document.getElementById('mem-ai-thread');

  var phone = String(s.supportPhone || '').trim();

  if (sl && zalo) sl.href = zalo.indexOf('http') === 0 ? zalo : ('https://zalo.me/' + zalo.replace(/\D/g, ''));

(function () {
  var U = '__SUN_FAVICON_URL__';
  if (typeof window.setFaviconUrl !== 'function') {
    window.SUN_FAVICON_URL = U;
    window.setFaviconUrl = function (url) {
      var u = url || window.SUN_FAVICON_URL || U;
      function ensure(rel, mime) {
        var link = document.querySelector('link[rel="' + rel + '"]');
        if (!link) {
          link = document.createElement('link');
          link.rel = rel;
          if (mime) link.type = mime;
          document.head.appendChild(link);
        }
        link.href = u;
      }
      ensure('icon', 'image/png');
      ensure('apple-touch-icon', null);
    };
  }
  if (!window.SUN_FAVICON_URL) window.SUN_FAVICON_URL = U;
  window.setFaviconUrl(window.SUN_FAVICON_URL);
})();
