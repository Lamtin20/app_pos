<script>

function gsErrMessage(e) {
  if (e == null) return 'Lỗi không xác định';
  if (typeof e === 'string') return e;
  if (e.message) return String(e.message);
  if (e.details) return String(e.details);
  try { return JSON.stringify(e); } catch (x) { return String(e); }
}
function api(method) {
  var args = Array.prototype.slice.call(arguments, 1);
  if (window.SUN_API && typeof window.SUN_API.api === 'function') {
    return window.SUN_API.api.apply(window.SUN_API, [method].concat(args));
  }
  return new Promise(function (resolve, reject) {
    var t = setTimeout(function () { reject(new Error('Hết thời gian chờ, bạn thử lại nhé.')); }, 42000);
    try {
      var runner = google.script.run
        .withSuccessHandler(function (r) { clearTimeout(t); resolve(r); })
        .withFailureHandler(function (e) { clearTimeout(t); reject(new Error(gsErrMessage(e))); });
      runner[method].apply(runner, args);
    } catch (e) { clearTimeout(t); reject(new Error(gsErrMessage(e))); }
  });
}
function apiLong(method, ms) {
  var args = Array.prototype.slice.call(arguments, 2);
  if (window.SUN_API && typeof window.SUN_API.apiLong === 'function') {
    return window.SUN_API.apiLong.apply(window.SUN_API, [method, ms].concat(args));
  }
  return new Promise(function (resolve, reject) {
    var t = setTimeout(function () { reject(new Error('Hết thời gian chờ, bạn thử lại nhé.')); }, ms || 55000);
    try {
      var runner = google.script.run
        .withSuccessHandler(function (r) { clearTimeout(t); resolve(r); })
        .withFailureHandler(function (e) { clearTimeout(t); reject(new Error(gsErrMessage(e))); });
      runner[method].apply(runner, args);
    } catch (e) { clearTimeout(t); reject(new Error(gsErrMessage(e))); }
  });
}
function portalMemberLookupHttp(phone) {
  return fetch('/api/member/portal?phone=' + encodeURIComponent(String(phone || '')), {
    method: 'GET',
    credentials: 'same-origin',
    cache: 'no-store',
  }).then(function (res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  });
}
function portalMemberBootstrapHttp() {
  return fetch('/api/member/bootstrap', {
    method: 'GET',
    credentials: 'same-origin',
    cache: 'no-store',
  }).then(function (res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  });
}
function fetchMemberNotificationsHttp(phone, accountMeta) {
  var url = '/api/member/notifications?phone=' + encodeURIComponent(String(phone || ''));
  if (accountMeta && typeof accountMeta === 'object') {
    url += '&accountMeta=' + encodeURIComponent(JSON.stringify(accountMeta));
  }
  return fetch(url, {
    method: 'GET',
    credentials: 'same-origin',
    cache: 'no-store',
  }).then(function (res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  });
}
function showToast(msg) {
  var el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function () { el.classList.remove('show'); }, 2800);
}
function normPhone(v) {
  var d = String(v || '').replace(/\D/g, '');
  if (!d) return '';
  if (d.indexOf('84') === 0 && d.length >= 10) d = '0' + d.slice(2);
  if (d.length === 9 && d.charAt(0) !== '0') d = '0' + d;
  return d;
}
function isPhone10(ph) {
  return /^0\d{9}$/.test(String(ph || ''));
}
function esc(s) {
  var d = document.createElement('div');
  d.textContent = s == null ? '' : s;
  return d.innerHTML;
}
function fmt(n) { return Math.round(n || 0).toLocaleString('vi-VN') + '₫'; }

var memberPortalSettings = null;
var memCarouselTimer = null;
var memCarouselIndex = 0;
var memCarouselList = [];
function carouselBannersForSettings(s) {
  s = s || {};
  var mobile = typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(max-width: 899px)').matches;
  if (mobile && Array.isArray(s.bannersMobile) && s.bannersMobile.length) return s.bannersMobile;
  if (!mobile && Array.isArray(s.bannersDesktop) && s.bannersDesktop.length) return s.bannersDesktop;
  return Array.isArray(s.banners) ? s.banners : [];
}
var memCarouselViewportMobile = null;
var memCarouselResizeBound = false;

function stopMemCarousel() {
  if (memCarouselTimer) { clearInterval(memCarouselTimer); memCarouselTimer = null; }
}
function bannerSlideImage(b) {
  return String((b && (b.image || b.imageUrl)) || '').trim();
}
var MEM_BANNER_FALLBACK_IMG = 'https://images.unsplash.com/photo-1550583724-b2692b85bf19?w=1200&q=80';
function memCarouselIsDual() {
  return typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(min-width: 900px)').matches && memCarouselList.length >= 2;
}
function memCarouselVisibleCount() {
  return memCarouselIsDual() ? 2 : 1;
}
function memCarouselMaxIndex() {
  return Math.max(0, memCarouselList.length - memCarouselVisibleCount());
}
function memCarouselDotCount() {
  if (!memCarouselList.length) return 0;
  if (memCarouselIsDual()) return memCarouselMaxIndex() + 1;
  return memCarouselList.length;
}
function memCarouselDotToIndex(dotIx) {
  return memCarouselIsDual() ? Math.min(dotIx, memCarouselMaxIndex()) : dotIx;
}
function memCarouselIndexToDot(ix) {
  return ix;
}
function rebuildMemCarouselDots() {
  var dots = document.getElementById('mem-carousel-dots');
  if (!dots) return;
  var count = memCarouselDotCount();
  if (count < 2) {
    dots.innerHTML = '';
    dots.style.display = 'none';
    return;
  }
  dots.style.display = 'flex';
  var activeDot = memCarouselIndexToDot(memCarouselIndex);
  dots.innerHTML = '';
  for (var i = 0; i < count; i++) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Slide ' + (i + 1));
    btn.setAttribute('data-i', String(i));
    btn.className = i === activeDot ? 'on' : '';
    btn.onclick = (function (dotIx) {
      return function () {
        memCarouselIndex = memCarouselDotToIndex(dotIx);
        applyMemCarouselView();
        startMemCarouselTimer();
      };
    })(i);
    dots.appendChild(btn);
  }
}
function applyMemCarouselView() {
  var box = document.getElementById('mem-carousel');
  if (!box || !memCarouselList.length) return;
  var dual = memCarouselIsDual();
  box.classList.toggle('mem-carousel-dual', dual);
  memCarouselIndex = Math.max(0, Math.min(memCarouselIndex, memCarouselMaxIndex()));
  var track = box.querySelector('.mem-carousel-track');
  var slides = box.querySelectorAll('.mem-slide');
  slides.forEach(function (sl, j) {
    sl.classList.toggle('on', !dual && j === memCarouselIndex);
  });
  if (dual && track && slides.length) {
    var gap = 12;
    var cardW = Math.max(120, Math.floor((box.offsetWidth - gap) / 2));
    box.style.setProperty('--mem-carousel-slide-w', cardW + 'px');
    slides.forEach(function (sl) {
      sl.style.flex = '0 0 ' + cardW + 'px';
      sl.style.width = cardW + 'px';
    });
    var slideStep = cardW + gap;
    track.style.transform = 'translateX(-' + (memCarouselIndex * slideStep) + 'px)';
  } else if (track) {
    track.style.transform = '';
  }
  var dots = document.getElementById('mem-carousel-dots');
  if (dots) {
    var activeDot = memCarouselIndexToDot(memCarouselIndex);
    dots.querySelectorAll('button').forEach(function (d, j) { d.classList.toggle('on', j === activeDot); });
  }
}
function startMemCarouselTimer() {
  stopMemCarousel();
  if (memCarouselList.length < 2) return;
  memCarouselTimer = setInterval(function () {
    var next = memCarouselIndex + 1;
    if (next > memCarouselMaxIndex()) next = 0;
    memCarouselIndex = next;
    applyMemCarouselView();
  }, 5200);
}
function buildMemCarouselSlides(banners) {
  var box = document.getElementById('mem-carousel');
  var carWrap = document.getElementById('mem-carousel-wrap');
  if (!box) return;
  stopMemCarousel();
  var list = (Array.isArray(banners) ? banners : []).filter(function (b) {
    if (!b) return false;
    return bannerSlideImage(b) || String(b.title || '').trim() || String(b.subtitle || '').trim();
  });
  memCarouselList = list;
  if (!list.length) {
    box.innerHTML = '';
    if (carWrap) {
      carWrap.classList.add('mem-hidden');
      carWrap.setAttribute('aria-hidden', 'true');
    }
    return;
  }
  if (carWrap) {
    carWrap.classList.remove('mem-hidden');
    carWrap.setAttribute('aria-hidden', 'false');
  }
  var slidesHtml = list.map(function (b, i) {
    var img = bannerSlideImage(b).replace(/\\/g, '/').replace(/'/g, '%27');
    if (!img) img = MEM_BANNER_FALLBACK_IMG;
    var bd = esc(b.badge || '');
    var t = esc(b.title || '');
    var s = esc(b.subtitle || '');
    var fb = MEM_BANNER_FALLBACK_IMG.replace(/'/g, '%27');
    return '<div class="mem-slide' + (i === 0 ? ' on' : '') + '" data-i="' + i + '">' +
      '<img class="mem-slide-img" src="' + img + '" alt="" loading="' + (i === 0 ? 'eager' : 'lazy') + '" decoding="async" onerror="this.onerror=null;this.src=\'' + fb + '\';">' +
      '<div class="mem-slide-cap">' + (bd ? '<span class="bdg">' + bd + '</span>' : '') +
      (t ? '<h3>' + t + '</h3>' : '') + (s ? '<p>' + s + '</p>' : '') + '</div></div>';
  }).join('');
  box.innerHTML = '<div class="mem-carousel-track">' + slidesHtml + '</div><div class="mem-carousel-dots" id="mem-carousel-dots"></div>';
  memCarouselIndex = 0;
  memCarouselViewportMobile = window.matchMedia && window.matchMedia('(max-width: 899px)').matches;
  rebuildMemCarouselDots();
  applyMemCarouselView();
  startMemCarouselTimer();
  if (!memCarouselResizeBound) {
    memCarouselResizeBound = true;
    window.addEventListener('resize', function () {
      var isMobile = window.matchMedia && window.matchMedia('(max-width: 899px)').matches;
      if (memCarouselViewportMobile === isMobile) {
        applyMemCarouselView();
        rebuildMemCarouselDots();
        return;
      }
      memCarouselViewportMobile = isMobile;
      if (memberPortalSettings) buildMemCarouselSlides(carouselBannersForSettings(memberPortalSettings));
      else {
        applyMemCarouselView();
        rebuildMemCarouselDots();
      }
      startMemCarouselTimer();
    });
  }
}

(function () {
  var U = '__SUN_FAVICON_URL__';
  if (typeof window.setFaviconUrl !== 'function') {
    window.SUN_FAVICON_URL = U;
    window.setFaviconUrl = function (url) {
      var u = url || window.SUN_FAVICON_URL || U;
      function ensure(rel, mime) {
        var link = document.querySelector('link[rel="' + rel + '"]');
        if (!link) {
          link = document.createElement('link');
          link.rel = rel;
          if (mime) link.type = mime;
          document.head.appendChild(link);
        }
        link.href = u;
      }
      ensure('icon', 'image/png');
      ensure('apple-touch-icon', null);
    };
  }
  if (!window.SUN_FAVICON_URL) window.SUN_FAVICON_URL = U;
  window.setFaviconUrl(window.SUN_FAVICON_URL);
})();
