<style>
  :root {
    --bg: #F3EDE6;
    --surface: #FFFCF8;
    --surface2: #FAF6F0;
    --border: rgba(120, 82, 48, 0.14);

  --font: 'Be Vietnam Pro', 'Inter', Arial, 'Helvetica Neue', Helvetica, sans-serif;

  }

  #mem-cart-addr-block { margin-top: 4px; }

  .mem-cart-sum-total { font-weight: 900; font-size: 16px; color: var(--primary); }
  .mem-cart-submit-btn { width: 100%; margin-top: 8px; }

  /* ===== Đơn nhóm (group order) ===== */

  .mem-group-card.mem-group-on {
    border: 1.5px solid rgba(234, 88, 12, .35);
    background: linear-gradient(150deg, #FFF9F2 0%, var(--surface) 55%);
    box-shadow: 0 8px 22px rgba(154, 52, 18, .09);
  }
  .mem-group-top { display: flex; gap: 14px; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; }
  .mem-group-title-wrap { flex: 1; min-width: 200px; }
  .mem-group-head { font-size: 15px; font-weight: 900; color: var(--primary-dk); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; line-height: 1.3; }
  .mem-group-substatus { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .mem-group-st { font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 999px; display: inline-flex; align-items: center; gap: 5px; }

  .mem-group-st-locked { background: rgba(185, 28, 28, .09); color: var(--red); }
  .mem-group-badge {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 999px; padding: 3px 10px; font-size: 11px; font-weight: 800; color: var(--text3);

  .mem-group-total-badge {
    background: rgba(234, 88, 12, .1); border-radius: 999px; padding: 3px 10px;
    font-size: 11px; font-weight: 900; color: var(--primary);

  .mem-group-me { font-size: 12px; color: var(--text2); margin-top: 8px; }
  .mem-group-code-box {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    background: var(--surface2); border: 1.5px dashed rgba(234, 88, 12, .45);
    border-radius: 14px; padding: 8px 16px;
  }
  .mem-group-code-box span { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--text3); letter-spacing: .5px; }
  .mem-group-code { font-size: 20px; font-weight: 900; letter-spacing: 3px; color: var(--primary); font-family: var(--display); }
  .mem-group-hint { font-size: 12px; color: var(--text3); margin: 6px 0 12px; line-height: 1.45; }
  .mem-group-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
  .mem-group-create-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .mem-group-create-row input { flex: 1 1 220px; min-width: 0; font-size: 13px; }
  .mem-group-create-row .btn-sm { white-space: nowrap; }
  .mem-group-join { display: flex; gap: 8px; flex: 1; min-width: 200px; }
  .mem-group-join input {
    flex: 1; min-width: 0; padding: 10px 12px; border-radius: 12px; border: 1.5px solid var(--border);
    background: var(--surface2); font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  }
  .mem-group-join input:focus { outline: none; border-color: var(--primary-lt); }
  .mem-group-leave { color: var(--red) !important; }
  .mem-group-wait {
    margin-top: 12px; padding: 12px 14px; border-radius: 14px; font-size: 12.5px; line-height: 1.5;
    background: rgba(234, 88, 12, .08); color: var(--primary-dk); font-weight: 600;
  }
  .mem-group-done-btn { display: flex; width: 100%; margin-top: 10px; justify-content: center; }
  /* Nút chốt đơn của trưởng nhóm - nổi bật ngay trong thẻ nhóm */
  .mem-group-finalize-btn {
    display: flex; width: 100%; justify-content: center; align-items: center; gap: 8px;
    margin-top: 14px; padding: 15px 18px; font-size: 15px; font-weight: 900;
    border-radius: 14px; box-shadow: 0 8px 20px rgba(194, 65, 12, .3);
  }
  .mem-group-finalize-btn:disabled { opacity: .7; cursor: wait; }
  .mem-group-finalize-n { font-weight: 700; opacity: .85; font-size: 13px; }
  .mem-group-finalize-hint {
    font-size: 11.5px; color: var(--text3); margin-top: 8px; line-height: 1.45; text-align: center;
  }
  .mem-group-section-label {
    font-size: 12px; font-weight: 900; color: var(--primary-dk);
    margin: 14px 0 8px; display: flex; align-items: center; gap: 6px;
  }
  .mem-group-members-empty {
    font-size: 12px; color: var(--text3); padding: 14px; text-align: center;
    border: 1.5px dashed var(--border); border-radius: 14px; background: var(--surface2);
  }
  .mem-group-members-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .mem-group-member {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 12px;
  }
  .mem-group-member-head {
    display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 800; color: var(--text);
    margin-bottom: 6px;
  }
  .mem-group-member-head span { margin-left: auto; color: var(--primary); font-weight: 900; }
  .mem-group-mi {
    display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap;
    font-size: 12px; color: var(--text2); padding: 3px 0;
  }
  .mem-group-mi .mem-ci-opts { flex-basis: 100%; font-size: 11px; color: var(--text3); }
  .mem-group-mi-empty { color: var(--text3); font-style: italic; }
  #mem-group-block.mem-group-flash .mem-group-card {
    animation: groupFlash 1.1s ease;
  }
  @keyframes groupFlash {
    0%, 100% { box-shadow: 0 8px 22px rgba(154, 52, 18, .09); }

  }
  .mem-guest-note { font-size: 12px; color: var(--text3); margin: 14px 0 0; text-align: center; }
  .mem-guest-note a { color: var(--primary); font-weight: 800; }

  /* ===== Khung thanh toán & QR chuyển khoản ===== */
  .mem-checkout-head {
    font-family: var(--display); font-size: 15px; font-weight: 900; color: var(--primary-dk);

    padding-bottom: 10px; border-bottom: 1.5px dashed var(--border);
  }
  .mem-cart-qr {
    margin-top: 12px; border: 1.5px solid rgba(234, 88, 12, .3); border-radius: 16px;
    background: linear-gradient(155deg, #FFF9F2 0%, var(--surface) 65%);
    padding: 12px 14px; animation: memFadeUp .3s ease;
  }
  .mem-cart-qr-head {
    font-size: 13px; font-weight: 900; color: var(--primary-dk);

    background: #fff; border: 1px solid var(--border); object-fit: contain;
  }
  .mem-cart-qr-amt-big {
    font-family: var(--display); font-size: 17px; font-weight: 900; color: var(--primary);

  .mem-cart-qr-row {

  }
  .mem-cart-qr-row span { flex: 0 0 68px; }
  .mem-cart-qr-row strong { color: var(--text); font-weight: 800; word-break: break-all; }
  .mem-cart-qr-amt { color: var(--primary) !important; font-size: 15px; }
  .mem-cart-qr-copy {
    border: 1px solid var(--border); background: var(--surface2); color: var(--primary-dk);
    width: 26px; height: 26px; border-radius: 8px; cursor: pointer; font-size: 11px;
    display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: background .15s ease;
  }
  .mem-cart-qr-copy:hover { background: rgba(234, 88, 12, .12); }
  .mem-cart-qr-hint { font-size: 11.5px; color: var(--text3); line-height: 1.5; margin: 10px 0 0; }
  .mem-cart-qr-pre {
    font-size: 11.5px; color: var(--primary-dk); line-height: 1.5; margin: 8px 0 0;
    background: rgba(234, 88, 12, .07); border: 1px dashed rgba(234, 88, 12, .35);
    border-radius: 10px; padding: 8px 10px; animation: memFadeUp .25s ease;
  }
  .mem-group-disc-badge {
    background: linear-gradient(120deg, #FEF3C7, #FDE68A); color: #92400E;
    border-radius: 999px; padding: 3px 10px; font-size: 11px; font-weight: 900;
  }
  .mem-group-disc-tag {
    font-style: normal; font-size: 10px; font-weight: 900; color: #92400E;
    background: #FEF3C7; border-radius: 999px; padding: 1px 7px; margin-left: 4px;

  @media (max-width: 380px) {
    .mem-cart-qr-body { flex-direction: column; align-items: center; }
    .mem-cart-qr-imgwrap { flex-basis: auto; }
    #mem-cart-qr-img { width: 180px; height: 180px; }
  }

  /* ===== Mượt & hiện đại: chuyển động nhẹ, kết nối giữa các thao tác ===== */
  html { scroll-behavior: smooth; }
  @keyframes memFadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .section.mem-page-active { animation: memFadeUp .28s ease; }
  .mem-choice-btn, .btn, .mem-nav-b, .menu-card, .pk-card, .mem-group-card {
    transition: transform .16s ease, box-shadow .2s ease, background .18s ease,
      border-color .18s ease, color .18s ease, opacity .18s ease;
  }
  .btn:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(154, 52, 18, .18); }
  .btn:not(:disabled):active { transform: translateY(0) scale(.98); box-shadow: none; }
  .mem-choice-btn:not(.on):hover { border-color: rgba(234, 88, 12, .45); background: rgba(234, 88, 12, .05); }
  .mem-choice-btn.on { box-shadow: 0 4px 12px rgba(154, 52, 18, .16); }
  #sec-order .pk-card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(60, 40, 25, .12); }
  .mem-group-member { transition: box-shadow .2s ease, transform .16s ease; }
  .mem-group-member:hover { box-shadow: 0 6px 16px rgba(60, 40, 25, .1); transform: translateY(-1px); }
  .mem-order-cta, .mem-cart-checkout-card { animation: memFadeUp .3s ease; }

  /* Thanh CTA nổi ở tab Đặt hàng - luôn thấy nút đi tiếp khi đã chọn món */
  .mem-order-cta {
    position: fixed; left: 0; right: 0;
    bottom: calc(72px + env(safe-area-inset-bottom, 0px));
    z-index: 95; display: none; align-items: center; gap: 10px;
    max-width: 560px; margin: 0 auto; padding: 10px 14px;
    background: rgba(255, 252, 248, .98); border-top: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
  body:not(.mem-view-order) .mem-order-cta { display: none !important; }
  .mem-order-cta-sum { flex: 1; font-weight: 900; font-size: 14px; color: var(--text); }
  .mem-order-cta-grp { color: var(--primary); font-size: 11px; font-weight: 800; margin-left: 4px; }
  .mem-order-cta-btn {
    border: none; border-radius: 12px; padding: 12px 18px; font-weight: 800; cursor: pointer;
    background: var(--primary-dk); color: #fff; font-family: var(--font); font-size: 13px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  @media (min-width: 900px) {
    .mem-order-cta {
      bottom: 18px; max-width: 720px; border: 1px solid var(--border);
      border-radius: 16px; box-shadow: 0 12px 32px rgba(60, 40, 25, .18);
    }
  }

  /* Tab chưa đăng nhập: chỉ làm mờ (không disabled để vẫn nhận click và nhắc đăng nhập) */
  .mem-nav-b.mem-nav-off { opacity: .45; }

  /* ===== Khách mời đơn nhóm: giao diện tối giản (Đặt hàng → Đơn nhóm) ===== */
  body.mem-guest-mode .mem-bottom-nav,
  body.mem-guest-mode .mem-nav-desktop { display: none !important; }
  body.mem-guest-mode .mem-order-cta {
    bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    left: 10px; right: 10px; border-radius: 16px;
    border: 1px solid var(--border); box-shadow: 0 12px 32px rgba(60, 40, 25, .18);
  }
  .mem-group-more-btn { display: flex; width: 100%; margin-top: 8px; justify-content: center; }

  /* ===== Trang chủ: bố cục gọn gàng, menu 2 cột trên mobile ===== */
  body.mem-logged-in #sec-home { padding: 6px 0 12px; }
  #mem-home-dashboard { padding: 0 0 16px; max-width: none; width: 100%; }
  .mem-carousel-wrap { width: 90%; margin: 0 auto; padding: 4px 0 0 !important; }
  .mem-carousel { border-radius: 18px; aspect-ratio: 16/10; min-height: 200px; max-height: none; }
  @media (max-width: 640px) {
    .mem-carousel { aspect-ratio: 4/3; min-height: 210px; }
  }
  .mem-carousel-dots { padding: 8px 0 0; }
  .mem-home-toolbar { display: none !important; visibility: hidden !important; height: 0 !important; margin: 0 !important; padding: 0 !important; overflow: hidden !important; }
  .mem-fav-chip, #btn-top-favorites { display: none !important; } /* Yêu thích tạm ẩn */
  .mem-home-menu-block { padding: 12px 12px 10px; border-radius: 16px; margin: 0 auto; width: 90%; }
  .mem-home-menu-block .mem-section-head { margin: 0 0 8px; }
  .mem-home-menu-grid,
  .mem-home-menu-grid.portal-menu-pro { grid-template-columns: repeat(2, 1fr) !important; gap: 10px; }
  @media (min-width: 640px) {
    .mem-home-menu-grid,
    .mem-home-menu-grid.portal-menu-pro { grid-template-columns: repeat(3, 1fr) !important; gap: 12px; }
  }
  @media (min-width: 1024px) {
    .mem-home-menu-grid,
    .mem-home-menu-grid.portal-menu-pro { grid-template-columns: repeat(4, 1fr) !important; gap: 14px; }
  }
  .mem-home-menu-grid .menu-card { border-radius: 16px; }
  .mem-home-menu-grid .menu-card .bd { padding: 9px 10px 10px; }
  .mem-home-menu-grid .menu-card .bd .nm { font-size: 12.5px; min-height: 2.3em; }
  @media (min-width: 900px) {
    body.mem-logged-in #sec-home { padding: 8px 0 16px; }
    #mem-home-dashboard { max-width: 1100px; padding: 0 0 28px; margin: 0 auto; }
    .mem-carousel-wrap { width: 90%; max-width: 990px; }
    .mem-home-toolbar, .mem-home-menu-block { width: 90%; max-width: 990px; }
    .mem-carousel { min-height: 260px; aspect-ratio: 16/9; }
  }

  /* ===== Chờ nhận nước (thành viên nhóm sau khi trưởng nhóm gửi đơn) ===== */
  body.mem-await-mode .mem-cart-checkout-card,
  body.mem-await-mode .mem-cart-promo-block,
  body.mem-await-mode .mem-cart-col-side,
  body.mem-await-mode #mem-cart-items { display: none !important; }
  @media (min-width: 900px) {
    body.mem-await-mode .mem-cart-grid-desktop { grid-template-columns: 1fr; max-width: 620px; margin: 0 auto; }
  }
  .mem-await-card { text-align: center; padding: 26px 20px 22px; animation: memFadeUp .3s ease; }
  .mem-await-anim {
    position: relative; display: inline-block; font-size: 56px; line-height: 1; margin: 2px 0 10px;
  }
  .mem-await-anim.making { animation: awaitBob 1.8s ease-in-out infinite; }
  .mem-await-anim.ready { animation: awaitPop .5s cubic-bezier(.34, 1.56, .64, 1); }
  @keyframes awaitBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @keyframes awaitPop { from { transform: scale(.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .mem-await-steam {
    position: absolute; top: -8px; width: 5px; height: 14px; border-radius: 999px;
    background: rgba(234, 88, 12, .45); opacity: 0; animation: steamUp 2s ease-in-out infinite;
  }
  .mem-await-steam.s1 { left: 30%; animation-delay: 0s; }
  .mem-await-steam.s2 { left: 48%; animation-delay: .5s; }
  .mem-await-steam.s3 { left: 66%; animation-delay: 1s; }
  @keyframes steamUp {
    0% { opacity: 0; transform: translateY(6px) scaleY(.7); }
    35% { opacity: .9; }
    100% { opacity: 0; transform: translateY(-16px) scaleY(1.15); }
  }
  .mem-await-status {
    font-family: var(--display); font-size: 16.5px; font-weight: 900; color: var(--primary-dk); line-height: 1.4;
  }
  .mem-await-status.ok { color: var(--green, #15803D); }
  .mem-await-status.err { color: var(--red, #B91C1C); }
  .mem-await-dots i { animation: awaitDot 1.2s infinite; display: inline-block; font-style: normal; }
  .mem-await-dots i:nth-child(2) { animation-delay: .2s; }
  .mem-await-dots i:nth-child(3) { animation-delay: .4s; }
  @keyframes awaitDot { 0%, 100% { opacity: .2; } 40% { opacity: 1; } }
  .mem-await-hint { font-size: 12px; color: var(--text3); margin: 8px 0 0; line-height: 1.5; }
  .mem-await-order { font-size: 12px; color: var(--text2); margin: 8px 0 14px; }
  .mem-await-order strong { color: var(--primary); }
  .mem-await-items {
    text-align: left; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 14px; margin: 0 0 6px;
  }
  .mem-await-items-t {
    font-size: 11px; font-weight: 900; color: var(--primary-dk); text-transform: uppercase;
    letter-spacing: .04em; margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  }
  .mem-await-item {
    display: flex; justify-content: space-between; gap: 10px; font-size: 13px; font-weight: 700;
    padding: 6px 0; border-top: 1px dashed var(--border); color: var(--text);
  }
  .mem-await-item:first-of-type { border-top: none; }
  .mem-await-item em { display: block; font-style: normal; font-size: 11px; color: var(--text3); font-weight: 600; }
  .mem-await-item span:last-child { color: var(--primary); font-weight: 900; white-space: nowrap; }
  .mem-await-got, .mem-await-new {
    display: flex; width: 100%; justify-content: center; align-items: center; gap: 8px;
    margin-top: 14px; padding: 14px 18px; font-size: 15px; font-weight: 900; border-radius: 14px;
    box-shadow: 0 8px 20px rgba(194, 65, 12, .28);
  }
  .mem-await-fb { margin-top: 14px; text-align: left; }
  .mem-await-fb textarea {
    width: 100%; border: 1.5px solid var(--border); border-radius: 12px; padding: 11px 12px;
    font-family: var(--font); font-size: 13px; resize: vertical; background: var(--surface2);
    box-sizing: border-box;
  }
  .mem-await-fb input {
    width: 100%; margin-top: 8px; border: 1.5px solid var(--border); border-radius: 12px;
    padding: 11px 12px; font-size: 14px; box-sizing: border-box; background: var(--surface2);
  }
